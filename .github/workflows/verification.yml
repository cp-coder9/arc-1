name: Verification

on:
  pull_request:
  push:
    branches:
      - main
      - phase-2-verification-workflows

permissions:
  contents: read

concurrency:
  group: verification-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck app
        run: npm run lint

      - name: Typecheck tests
        run: npm run lint:tests

      - name: Run test suite
        run: npm test

      - name: Validate API contract docs
        run: npm run docs:api-contracts

      - name: Build production bundle
        run: npm run build
