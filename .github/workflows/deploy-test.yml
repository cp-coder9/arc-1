name: Deploy test.architex.co.za

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Build and bundle only, skip FTP upload and smoke test'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deploy-test-${{ github.ref }}
  cancel-in-progress: true

env:
  VITE_API_BASE_URL: 'https://api.architex.co.za'

jobs:
  deploy-test:
    name: Build, upload, and smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build test bundle
        run: |
          npm run build
          node scripts/build-static-upload-bundle.mjs

      - name: Upload via FTP (Python)
        if: ${{ !inputs.dry-run }}
        shell: python
        env:
          FTP_SERVER: ${{ secrets.TEST_ARCHITEX_FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.TEST_ARCHITEX_FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.TEST_ARCHITEX_FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.TEST_ARCHITEX_FTP_SERVER_DIR }}
          LOCAL_DIR: release/ftp-upload
        run: |
          import ftplib, os, sys
          server = os.environ['FTP_SERVER']
          username = os.environ['FTP_USERNAME']
          password = os.environ['FTP_PASSWORD']
          server_dir = os.environ['FTP_SERVER_DIR']
          local_dir = os.environ['LOCAL_DIR']
          print(f'Connecting to {server}...')
          ftp = ftplib.FTP(server)
          ftp.login(username, password)
          ftp.cwd(server_dir)
          uploaded = 0
          for root, dirs, files in os.walk(local_dir):
            rel = os.path.relpath(root, local_dir)
            if rel == '.':
              rel = ''
            if rel and rel not in dirs:
              ftp.mkd(rel)
              print(f'  mkdir {rel}')
            for f in files:
              local_path = os.path.join(root, f)
              remote_path = os.path.join(rel, f) if rel else f
              remote_dir = os.path.dirname(remote_path)
              if remote_dir:
                try: ftp.cwd(server_dir); ftp.cwd(remote_dir)
                except: ftp.mkd(remote_dir); ftp.cwd(server_dir); ftp.cwd(remote_dir)
                finally: ftp.cwd(server_dir)
              with open(local_path, 'rb') as fh:
                ftp.storbinary(f'STOR {remote_path}', fh)
              uploaded += 1
          ftp.quit()
          print(f'Uploaded {uploaded} files to {server}:{server_dir}')

      - name: Smoke test
        if: ${{ !inputs.dry-run }}
        run: npm run deploy:test:smoke
