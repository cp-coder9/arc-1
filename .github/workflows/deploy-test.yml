name: Deploy test.architex.co.za

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Build and bundle only, skip FTP upload and smoke test'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deploy-test-${{ github.ref }}
  cancel-in-progress: true

env:
  VITE_API_BASE_URL: 'https://api.architex.co.za'

jobs:
  deploy-test:
    name: Build, upload, and smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build test bundle
        run: |
          npm run build
          node scripts/build-static-upload-bundle.mjs

      - name: Upload SPA via FTP
        if: ${{ !inputs.dry-run }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.TEST_ARCHITEX_FTP_SERVER }}
          username: ${{ secrets.TEST_ARCHITEX_FTP_USERNAME }}
          password: ${{ secrets.TEST_ARCHITEX_FTP_PASSWORD }}
          server-dir: public_html/test.architex.co.za/
          local-dir: release/ftp-upload/
          state-name: deploy-spa-state-${{ github.run_id }}.json
          log-level: verbose

      - name: Prepare API PHP release
        if: ${{ !inputs.dry-run }}
        run: |
          mkdir -p release/api-php-upload
          cp -r api-php/* release/api-php-upload/

      - name: Upload API PHP gateway via FTP
        if: ${{ !inputs.dry-run }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.TEST_ARCHITEX_FTP_SERVER }}
          username: ${{ secrets.TEST_ARCHITEX_FTP_USERNAME }}
          password: ${{ secrets.TEST_ARCHITEX_FTP_PASSWORD }}
          server-dir: public_html/api.architex.co.za/
          local-dir: release/api-php-upload/
          state-name: deploy-api-state-${{ github.run_id }}.json
          log-level: verbose

      - name: Smoke test
        if: ${{ !inputs.dry-run }}
        run: npm run deploy:test:smoke
