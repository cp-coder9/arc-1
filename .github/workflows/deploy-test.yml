name: Deploy test.architex.co.za

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Build and bundle only, skip FTP upload and smoke test'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deploy-test-${{ github.ref }}
  cancel-in-progress: true

env:
  VITE_API_BASE_URL: 'https://api.architex.co.za'

jobs:
  deploy-test:
    name: Build, upload, and smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build test bundle
        run: |
          npm run build
          node scripts/build-static-upload-bundle.mjs

      - name: Clear stale FTP sync state
        if: ${{ !inputs.dry-run }}
        run: |
          lftp -u "${{ secrets.TEST_ARCHITEX_FTP_USERNAME }}","${{ secrets.TEST_ARCHITEX_FTP_PASSWORD }}" \
            "${{ secrets.TEST_ARCHITEX_FTP_SERVER }}" \
            -e "rm -f ${{ secrets.TEST_ARCHITEX_FTP_SERVER_DIR }}/ftp-deploy-sync-state.json; quit" 2>&1 || \
            echo "No stale state to clear or lftp not available"

      - name: Upload via FTP
        if: ${{ !inputs.dry-run }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.TEST_ARCHITEX_FTP_SERVER }}
          username: ${{ secrets.TEST_ARCHITEX_FTP_USERNAME }}
          password: ${{ secrets.TEST_ARCHITEX_FTP_PASSWORD }}
          local-dir: release/ftp-upload/
          server-dir: ${{ format('{0}/', secrets.TEST_ARCHITEX_FTP_SERVER_DIR) }}

      - name: Smoke test
        if: ${{ !inputs.dry-run }}
        run: npm run deploy:test:smoke
