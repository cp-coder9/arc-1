    <!-- Theme pre-paint bootstrap (feature: website-ui-redesign).

         light (only when no stored value) -> Dark_Theme default. All storage
         access is wrapped in try/catch; any failure falls back to dark. -->

      (function () {
        try {
          var stored = null;
          try { stored = localStorage.getItem('architex-theme'); } catch (e) {}

            stored === 'dark' || stored === 'light'
              ? stored
              : (window.matchMedia &&
                  window.matchMedia('(prefers-color-scheme: light)').matches
                  ? 'light'
                  : 'dark');

          root.setAttribute('data-theme', mode);
          if (mode === 'dark') root.classList.add('dark');
          else root.classList.remove('dark');
        } catch (e) {
          var el = document.documentElement;
          el.setAttribute('data-theme', 'dark');
          el.classList.add('dark');
        }
      })();
    </script>
