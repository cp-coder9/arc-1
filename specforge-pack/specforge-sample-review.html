<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpecForge — Architex OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d2520; --bg-deep: #081a16; --bg-os-nav: #061410;
  --primary: #005b4e; --primary-light: #007666; --secondary: #aeefe3;
  --text-primary: #ffffff; --text-muted: rgba(255,255,255,0.62); --text-low: rgba(255,255,255,0.42);
  --glass-bg: rgba(255,255,255,0.07); --glass-border: rgba(174,239,227,0.24); --glass-glow: rgba(0,118,102,0.38);
  --panel-bg: rgba(255,255,255,0.05); --card-bg: #11302a;
  --btn-gradient: linear-gradient(180deg, #c5f6d4, #aeefe3); --btn-text: #00201b;
  --gold: #F1D39A; --danger: #d95747; --green: #4ADE80; --amber: #F5A623;
  --grid-lines: rgba(174,239,227,0.06); --radius: 10px; --radius-sm: 6px;
  --font-heading: 'Space Grotesk', sans-serif; --font-body: 'Inter', sans-serif;
  --os-nav-width: 56px; --os-nav-expanded: 240px; --tool-nav-width: 200px; --topbar-height: 36px;
  --input-bg: rgba(255,255,255,0.06); --input-border: rgba(174,239,227,0.2); --input-focus: rgba(174,239,227,0.5);
}
html, body { height:100%; background:var(--bg); color:var(--text-primary); font-family:var(--font-body); font-size:14px; line-height:1.5; overflow:hidden; }
body::before { content:''; position:fixed; inset:0; background: radial-gradient(ellipse 60% 50% at 30% 40%, var(--glass-glow) 0%, transparent 70%), radial-gradient(ellipse 40% 40% at 75% 60%, rgba(174,239,227,0.04) 0%, transparent 60%); pointer-events:none; z-index:0; }
body::after { content:''; position:fixed; inset:0; background-image: linear-gradient(var(--grid-lines) 1px, transparent 1px), linear-gradient(90deg, var(--grid-lines) 1px, transparent 1px); background-size:56px 56px; pointer-events:none; z-index:0; }
.app-shell { display:grid; grid-template-columns:var(--os-nav-width) var(--tool-nav-width) 1fr; grid-template-rows:var(--topbar-height) 1fr; height:100vh; position:relative; z-index:1; }
.os-nav { grid-row:1/-1; background:var(--bg-os-nav); border-right:1px solid rgba(174,239,227,0.12); display:flex; flex-direction:column; align-items:center; padding:12px 0; position:relative; z-index:100; }
.os-nav-logo { width:32px; height:32px; margin-bottom:20px; cursor:pointer; color:var(--secondary); }
.os-nav-logo svg { width:100%; height:100%; }
.os-nav-items { display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; }
.os-nav-item { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:var(--text-low); cursor:pointer; transition:all 0.2s; position:relative; }
.os-nav-item:hover { background:rgba(174,239,227,0.08); color:var(--text-primary); }
.os-nav-item.active { color:var(--secondary); }
.os-nav-item.active::after { content:''; position:absolute; right:-2px; top:50%; transform:translateY(-50%); width:4px; height:4px; border-radius:50%; background:var(--secondary); box-shadow:0 0 6px var(--secondary); }
.os-nav-item svg { width:20px; height:20px; }
.os-nav-item .tip { position:absolute; left:52px; top:50%; transform:translateY(-50%); background:var(--card-bg); border:1px solid var(--glass-border); border-radius:var(--radius-sm); padding:3px 8px; font-size:10px; color:var(--text-primary); white-space:nowrap; opacity:0; pointer-events:none; transition:opacity 0.2s; z-index:200; }
.os-nav-item:hover .tip { opacity:1; }
.os-nav-expanded-overlay { position:fixed; left:0; top:0; bottom:0; width:var(--os-nav-expanded); background:var(--bg-os-nav); border-right:1px solid rgba(174,239,227,0.15); z-index:500; padding:16px; display:none; flex-direction:column; box-shadow:8px 0 32px rgba(0,0,0,0.5); }
.os-nav-expanded-overlay.open { display:flex; }
.os-exp-header { display:flex; align-items:center; gap:10px; margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid rgba(174,239,227,0.12); }
.os-exp-header .logo-text { font-family:var(--font-heading); font-size:16px; font-weight:700; color:var(--secondary); }
.os-exp-close { margin-left:auto; background:none; border:none; color:var(--text-low); cursor:pointer; font-size:18px; }
.os-exp-user { padding:10px; background:rgba(174,239,227,0.06); border-radius:var(--radius-sm); margin-bottom:14px; border:1px solid rgba(174,239,227,0.1); }
.os-exp-user .name { font-size:12px; font-weight:600; color:var(--text-primary); }
.os-exp-user .project { font-size:10px; color:var(--text-low); margin-top:2px; }
.os-exp-item { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:var(--radius-sm); color:var(--text-muted); cursor:pointer; font-size:12px; transition:all 0.2s; }
.os-exp-item:hover { background:rgba(174,239,227,0.06); color:var(--text-primary); }
.os-exp-item.active { color:var(--secondary); background:rgba(174,239,227,0.08); }
.os-exp-item svg { width:16px; height:16px; flex-shrink:0; }
.os-backdrop { position:fixed; inset:0; background:rgba(4,12,10,0.4); z-index:499; display:none; }
.os-backdrop.open { display:block; }
.tool-nav { grid-row:1/-1; background:var(--glass-bg); border-right:1px solid var(--glass-border); backdrop-filter:blur(16px); display:flex; flex-direction:column; overflow-y:auto; padding:10px 0; position:relative; }
.tool-nav::-webkit-scrollbar { width:4px; }
.tool-nav::-webkit-scrollbar-thumb { background:var(--glass-border); border-radius:2px; }
.tool-nav-header { padding:6px 12px 12px; border-bottom:1px solid var(--glass-border); margin-bottom:6px; }
.tool-nav-header h2 { font-family:var(--font-heading); font-size:15px; font-weight:700; color:var(--secondary); }
.tool-nav-header .sub { font-size:9px; color:var(--text-low); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
.tool-nav-back { display:flex; align-items:center; gap:5px; padding:5px 12px; font-size:10px; color:var(--text-low); cursor:pointer; transition:color 0.2s; margin-bottom:6px; }
.tool-nav-back:hover { color:var(--secondary); }
.tool-nav-back svg { width:12px; height:12px; }
.nav-role-badge { margin:0 8px 8px; padding:5px 8px; background:rgba(174,239,227,0.08); border:1px solid rgba(174,239,227,0.15); border-radius:var(--radius-sm); font-size:9px; color:var(--secondary); font-weight:500; }
.nav-section-label { padding:8px 12px 3px; font-size:8px; text-transform:uppercase; letter-spacing:1.2px; color:var(--text-low); font-weight:600; }
.nav-item { display:flex; align-items:center; gap:7px; padding:6px 12px; cursor:pointer; color:var(--text-muted); font-size:11px; transition:all 0.2s; border-left:3px solid transparent; }
.nav-item:hover { color:var(--text-primary); background:rgba(174,239,227,0.05); border-left-color:rgba(174,239,227,0.3); }
.nav-item.active { color:var(--secondary); background:rgba(174,239,227,0.08); border-left-color:var(--secondary); font-weight:500; }
.nav-item svg { width:13px; height:13px; flex-shrink:0; opacity:0.7; }
.nav-item.active svg { opacity:1; }
.top-bar { background:var(--bg-os-nav); border-bottom:1px solid var(--glass-border); display:flex; align-items:center; padding:0 16px; gap:10px; font-size:11px; }
.breadcrumb { color:var(--text-low); }
.breadcrumb .sep { color:rgba(174,239,227,0.3); margin:0 4px; }
.breadcrumb .cur { color:var(--secondary); font-weight:500; }
.top-bar-spacer { flex:1; }
.top-filter { display:flex; align-items:center; gap:5px; }
.filter-select { background:var(--card-bg); border:1px solid var(--glass-border); border-radius:var(--radius-sm); color:var(--text-muted); padding:3px 7px; font-size:10px; font-family:var(--font-body); cursor:pointer; outline:none; }
.filter-select:focus { border-color:var(--secondary); }
.filter-select option { background:var(--card-bg); color:var(--text-primary); }
.btn { display:inline-flex; align-items:center; gap:4px; padding:5px 10px; border-radius:var(--radius-sm); font-size:10px; font-weight:500; font-family:var(--font-body); cursor:pointer; transition:all 0.2s; border:none; white-space:nowrap; }
.btn-primary { background:var(--btn-gradient); color:var(--btn-text); font-weight:600; }
.btn-primary:hover { box-shadow:0 0 14px rgba(174,239,227,0.4); transform:translateY(-1px); }
.btn-gold { background:var(--gold); color:var(--btn-text); font-weight:600; }
.btn-gold:hover { background:#f8e0b0; }
.btn-secondary { background:transparent; color:var(--text-muted); border:1px solid var(--glass-border); }
.btn-secondary:hover { border-color:var(--secondary); color:var(--text-primary); }
.btn-danger { background:rgba(217,87,71,0.15); color:var(--danger); border:1px solid rgba(217,87,71,0.3); }
.btn-danger:hover { background:rgba(217,87,71,0.25); }
.main-content { overflow-y:auto; padding:18px; position:relative; }
.main-content::-webkit-scrollbar { width:5px; }
.main-content::-webkit-scrollbar-thumb { background:var(--glass-border); border-radius:3px; }
.panel { background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:var(--radius); backdrop-filter:blur(16px); padding:16px; margin-bottom:14px; transition:border-color 0.3s; position:relative; }
.panel:hover { border-color:rgba(174,239,227,0.4); }
.panel-title { font-family:var(--font-heading); font-size:12px; font-weight:600; color:var(--text-primary); margin-bottom:10px; display:flex; align-items:center; gap:7px; }
.panel-title .dot { width:5px; height:5px; border-radius:50%; background:var(--secondary); }
.panel-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.chip { display:inline-flex; align-items:center; padding:2px 6px; border-radius:4px; font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:0.4px; }
.chip-draft { background:rgba(255,255,255,0.08); color:var(--text-muted); }
.chip-approved { background:rgba(74,222,128,0.15); color:var(--green); }
.chip-needs_decision { background:rgba(241,211,154,0.2); color:var(--gold); }
.chip-rejected { background:rgba(217,87,71,0.15); color:var(--danger); }
.chip-blocker { background:rgba(217,87,71,0.2); color:var(--danger); }
.chip-high { background:rgba(245,166,35,0.2); color:var(--amber); }
.chip-medium { background:rgba(241,211,154,0.15); color:var(--gold); }
.chip-ok { background:rgba(74,222,128,0.12); color:var(--green); }
.badge { display:inline-flex; align-items:center; padding:2px 5px; border-radius:3px; font-size:9px; font-weight:500; background:rgba(174,239,227,0.1); color:var(--secondary); border:1px solid rgba(174,239,227,0.15); }
.badge-gold { background:rgba(241,211,154,0.1); color:var(--gold); border-color:rgba(241,211,154,0.2); }
.badge-red { background:rgba(217,87,71,0.1); color:var(--danger); border-color:rgba(217,87,71,0.2); }
.badge-amber { background:rgba(245,166,35,0.1); color:var(--amber); border-color:rgba(245,166,35,0.2); }
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(120px,1fr)); gap:8px; }
.stat-card { background:var(--panel-bg); border:1px solid var(--glass-border); border-radius:var(--radius-sm); padding:10px; text-align:center; }
.stat-value { font-family:var(--font-heading); font-size:20px; font-weight:700; color:var(--secondary); }
.stat-label { font-size:9px; color:var(--text-low); margin-top:2px; }
.pictorial-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr)); gap:12px; }
.pic-card { background:var(--card-bg); border:1px solid var(--glass-border); border-radius:var(--radius); overflow:hidden; transition:all 0.25s; cursor:pointer; }
.pic-card:hover { border-color:rgba(174,239,227,0.4); box-shadow:0 6px 24px rgba(0,118,102,0.15); transform:translateY(-2px); }
.pic-card-img { width:100%; height:130px; object-fit:cover; display:block; border-bottom:1px solid var(--glass-border); }
.pic-card-body { padding:10px; }
.pic-card-title { font-family:var(--font-heading); font-size:12px; font-weight:600; margin-bottom:3px; }
.pic-card-code { font-size:9px; color:var(--text-low); font-family:monospace; margin-bottom:5px; }
.pic-card-meta { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:6px; }
.pic-card-footer { display:flex; align-items:center; justify-content:space-between; padding-top:6px; border-top:1px solid var(--glass-border); }
.pic-budget { font-size:9px; font-weight:600; }
.pic-budget.over { color:var(--danger); }
.pic-budget.under { color:var(--green); }
.pic-budget.warn { color:var(--amber); }
.pic-leadtime { font-size:9px; color:var(--text-low); }
.pic-leadtime.long { color:var(--amber); }
.risk-flags { display:flex; gap:3px; flex-wrap:wrap; margin-top:5px; }
.pic-card-add { background:transparent; border:2px dashed rgba(174,239,227,0.25); border-radius:var(--radius); display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:260px; cursor:pointer; transition:all 0.25s; }
.pic-card-add:hover { border-color:var(--secondary); background:rgba(174,239,227,0.04); }
.pic-card-add .plus { font-size:32px; color:var(--secondary); margin-bottom:6px; font-weight:300; }
.pic-card-add .add-label { font-size:11px; color:var(--text-low); }
.modal-overlay { position:fixed; inset:0; background:rgba(4,12,10,0.85); backdrop-filter:blur(8px); z-index:1000; display:flex; align-items:center; justify-content:center; padding:16px; opacity:0; pointer-events:none; transition:opacity 0.25s; }
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal-content { background:var(--card-bg); border:1px solid var(--secondary); border-radius:var(--radius); max-width:720px; width:100%; max-height:88vh; overflow-y:auto; padding:22px; box-shadow:0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(174,239,227,0.08); transform:translateY(10px); transition:transform 0.25s; }
.modal-overlay.open .modal-content { transform:translateY(0); }
.modal-content::-webkit-scrollbar { width:4px; }
.modal-content::-webkit-scrollbar-thumb { background:var(--glass-border); border-radius:2px; }
.modal-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
.modal-title { font-family:var(--font-heading); font-size:16px; font-weight:700; }
.modal-close { background:none; border:none; color:var(--text-low); cursor:pointer; font-size:18px; padding:2px 6px; border-radius:4px; }
.modal-close:hover { color:var(--text-primary); }
.modal-field { margin-bottom:10px; }
.modal-field-label { font-size:9px; color:var(--text-low); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:2px; }
.modal-field-value { font-size:12px; color:var(--text-primary); }
.modal-actions { display:flex; gap:6px; margin-top:14px; padding-top:12px; border-top:1px solid var(--glass-border); flex-wrap:wrap; }
.form-group { margin-bottom:12px; }
.form-label { display:block; font-size:9px; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-low); margin-bottom:4px; font-weight:500; }
.form-input,.form-select,.form-textarea { width:100%; background:var(--input-bg); border:1px solid var(--input-border); border-radius:8px; padding:9px 12px; color:var(--text-primary); font-size:12px; font-family:var(--font-body); outline:none; transition:border-color 0.2s, box-shadow 0.2s; }
.form-input:focus,.form-select:focus,.form-textarea:focus { border-color:var(--input-focus); box-shadow:0 0 0 3px rgba(174,239,227,0.1); }
.form-input::placeholder,.form-textarea::placeholder { color:var(--text-low); }
.form-select { cursor:pointer; }
.form-select option { background:var(--card-bg); color:var(--text-primary); }
.form-textarea { min-height:60px; resize:vertical; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
.form-check { display:flex; align-items:center; gap:7px; }
.form-check input[type="checkbox"] { width:14px; height:14px; accent-color:var(--secondary); }
.form-check label { font-size:11px; color:var(--text-muted); }
.section-row { display:flex; align-items:center; gap:10px; padding:9px 12px; border:1px solid var(--glass-border); border-radius:var(--radius-sm); margin-bottom:5px; background:var(--panel-bg); cursor:pointer; transition:all 0.2s; }
.section-row:hover { border-color:rgba(174,239,227,0.4); }
.section-code { font-family:var(--font-heading); font-size:15px; font-weight:700; color:var(--primary-light); min-width:28px; }
.section-info { flex:1; }
.section-title { font-weight:500; font-size:11px; }
.section-discipline { font-size:9px; color:var(--text-low); }
.section-count { font-size:9px; color:var(--text-muted); background:var(--card-bg); padding:2px 6px; border-radius:3px; }
.section-items { display:none; padding:4px 0 4px 40px; }
.section-row.expanded + .section-items { display:block; }
.section-item-row { display:flex; align-items:center; gap:7px; padding:4px 8px; font-size:10px; border-left:2px solid var(--glass-border); margin-bottom:2px; cursor:pointer; }
.section-item-row:hover { background:rgba(174,239,227,0.04); }
.kanban-board { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:12px; }
.kanban-column { background:var(--panel-bg); border:1px solid var(--glass-border); border-radius:var(--radius); padding:10px; }
.kanban-col-title { font-family:var(--font-heading); font-size:10px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px; padding-bottom:5px; border-bottom:1px solid var(--glass-border); }
.kanban-card { background:var(--card-bg); border:1px solid var(--glass-border); border-radius:var(--radius-sm); padding:7px 9px; margin-bottom:5px; font-size:10px; }
.kanban-card-title { font-weight:500; margin-bottom:2px; }
.kanban-card-meta { font-size:9px; color:var(--text-low); }
.integration-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:12px; }
.integration-card { background:var(--panel-bg); border:1px solid var(--glass-border); border-radius:var(--radius); padding:14px; position:relative; overflow:hidden; transition:all 0.3s; }
.integration-card:hover { border-color:rgba(174,239,227,0.4); }
.integration-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--btn-gradient); opacity:0.6; }
.integration-card-title { font-family:var(--font-heading); font-size:11px; font-weight:600; color:var(--secondary); margin-bottom:6px; display:flex; align-items:center; gap:5px; }
.integration-card-title .sd { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 5px rgba(74,222,128,0.5); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }
.integration-card-title .sd.warn { background:var(--amber); box-shadow:0 0 5px rgba(245,166,35,0.5); }
.integration-metric { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid rgba(174,239,227,0.08); font-size:10px; }
.integration-metric:last-child { border-bottom:none; }
.integration-metric .label { color:var(--text-muted); }
.integration-metric .value { color:var(--text-primary); font-weight:500; }
.connection-line { position:relative; padding-left:16px; margin:4px 0; font-size:10px; color:var(--text-muted); }
.connection-line::before { content:''; position:absolute; left:4px; top:0; bottom:0; width:2px; background:var(--glass-border); }
.connection-line::after { content:''; position:absolute; left:1px; top:50%; transform:translateY(-50%); width:7px; height:7px; border-radius:50%; background:var(--primary-light); border:2px solid var(--secondary); }
.ai-rec-card { background:linear-gradient(135deg, rgba(0,91,78,0.3), rgba(174,239,227,0.08)); border:1px solid rgba(174,239,227,0.3); border-radius:var(--radius-sm); padding:8px 10px; margin-top:5px; }
.ai-rec-card .ai-label { font-size:8px; text-transform:uppercase; letter-spacing:1px; color:var(--secondary); margin-bottom:2px; font-weight:600; }
.toast { position:fixed; bottom:18px; right:18px; background:var(--card-bg); border:1px solid var(--secondary); border-radius:var(--radius-sm); padding:9px 16px; color:var(--secondary); font-size:11px; font-weight:500; z-index:2000; box-shadow:0 8px 32px rgba(0,0,0,0.4); opacity:0; transform:translateY(10px); transition:all 0.3s; pointer-events:none; }
.toast.show { opacity:1; transform:translateY(0); }
.view-panel { display:none; }
.view-panel.active { display:block; animation:fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.snapshot-json { background:var(--bg-deep); border:1px solid var(--glass-border); border-radius:var(--radius-sm); padding:10px; font-family:monospace; font-size:9px; color:var(--secondary); max-height:300px; overflow-y:auto; white-space:pre-wrap; word-break:break-all; }
@media (max-width:1024px) { .app-shell { grid-template-columns:var(--os-nav-width) 50px 1fr; } .tool-nav .nav-item span,.tool-nav-header .sub,.nav-section-label,.nav-role-badge { display:none; } .nav-item { justify-content:center; padding:8px; } }
@media (max-width:768px) { .app-shell { grid-template-columns:1fr; grid-template-rows:var(--topbar-height) 1fr; } .os-nav,.tool-nav { display:none; } .pictorial-grid { grid-template-columns:1fr 1fr; } }

<script>
// ===== STATE & PERMISSIONS =====
let currentRole = 'architect';
let currentRoom = '';
let currentPackage = '';
let idCounter = 100;
const ROLE_CAPABILITIES = {
  architect: { canIssue:true, viewAll:true, label:'Project Architect' },
  bep: { canIssue:true, viewAll:true, label:'Interior Lead (BEP)' },
  quantity_surveyor: { canIssue:false, viewAll:true, label:'QS Reviewer' },
  client: { canIssue:false, viewAll:false, label:'Client Rep' },
  contractor: { canIssue:false, viewAll:false, label:'Main Contractor' },
  supplier: { canIssue:false, viewAll:false, label:'Supplier' },
  subcontractor: { canIssue:false, viewAll:false, label:'Subcontractor' }
};
const ROLES_LIST = ['architect','bep','quantity_surveyor','client','contractor','supplier','subcontractor','engineer'];
function canEdit(item) { return currentRole === item.ownerRole; }
function canApprove(item) { return currentRole === item.approverRole; }
function canReview(item) { return currentRole === item.reviewerRole; }
function canRequestSubstitution() { return ['contractor','supplier','subcontractor'].includes(currentRole); }
function visibleItemsForRole(role) {
  const items = getFilteredItems();
  if (ROLE_CAPABILITIES[role] && ROLE_CAPABILITIES[role].viewAll) return items;
  if (role==='client') return items.filter(i=>i.clientDecision||i.approverRole==='client'||i.status==='approved');
  if (role==='contractor') return items.filter(i=>i.reviewerRole==='contractor'||i.status==='approved');
  if (role==='supplier') return items.filter(i=>i.status==='approved'||i.reviewerRole==='supplier');
  if (role==='subcontractor') return items.filter(i=>i.reviewerRole==='subcontractor'||i.ownerRole==='subcontractor'||i.status==='approved');
  return items;
}
function getFilteredItems() {
  let items = [...SAMPLE_WORKSPACE.items];
  if (currentRoom) items = items.filter(i=>i.room===currentRoom);
  if (currentPackage) items = items.filter(i=>i.package===currentPackage);
  return items;
}
function budgetSummary() {
  const items = SAMPLE_WORKSPACE.items;
  const totalAllowance = items.reduce((s,i)=>s+i.budgetAllowance,0);
  const totalEstimate = items.reduce((s,i)=>s+i.estimatedCost,0);
  const delta = totalEstimate - totalAllowance;
  const deltaPct = ((delta/totalAllowance)*100).toFixed(1);
  return { totalAllowance, totalEstimate, delta, deltaPct, longLeadCount:items.filter(i=>i.leadTimeDays>42).length, staleCount:items.filter(i=>i.supersededBy).length };
}
function validateIssueReadiness() {
  const findings = [];
  const items = SAMPLE_WORKSPACE.items;
  const pendingClient = items.filter(i=>i.clientDecision && i.status!=='approved');
  if (pendingClient.length>0) findings.push({severity:'blocker',message:pendingClient.length+' client decision(s) pending',items:pendingClient.map(i=>i.code)});
  const overBudget = items.filter(i=>i.estimatedCost>i.budgetAllowance);
  if (overBudget.length>0) findings.push({severity:'high',message:overBudget.length+' item(s) over budget',items:overBudget.map(i=>i.code)});
  const superseded = items.filter(i=>i.supersededBy);
  if (superseded.length>0) findings.push({severity:'high',message:superseded.length+' item(s) superseded',items:superseded.map(i=>i.code)});
  const longLead = items.filter(i=>i.leadTimeDays>60);
  if (longLead.length>0) findings.push({severity:'medium',message:longLead.length+' item(s) lead >60d',items:longLead.map(i=>i.code)});
  if (items.filter(i=>i.status==='draft').length===0) findings.push({severity:'ok',message:'All items reviewed',items:[]});
  return findings;
}
function formatCurrency(v) { return 'R '+v.toLocaleString('en-ZA'); }
function getStatusLabel(s) { return {draft:'Draft',approved:'Approved',needs_decision:'Needs Decision',rejected:'Rejected'}[s]||s; }
function genId() { return 'item-gen-'+(++idCounter); }
function genSectionId() { return 'sec-gen-'+(++idCounter); }
</script>
<script>
// ===== UI FUNCTIONS =====
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }
function openModal(html) { document.getElementById('modalContent').innerHTML=html; document.getElementById('modalOverlay').classList.add('open'); }
function closeModal(e) { if(!e||e.target===document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('open'); }
function openOsNav() { document.getElementById('osExpanded').classList.add('open'); document.getElementById('osBackdrop').classList.add('open'); }
function closeOsNav() { document.getElementById('osExpanded').classList.remove('open'); document.getElementById('osBackdrop').classList.remove('open'); }
function switchView(viewId) {
  document.querySelectorAll('.view-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const panel = document.getElementById('view-'+viewId);
  if(panel) panel.classList.add('active');
  const nav = document.querySelector('.nav-item[data-view="'+viewId+'"]');
  if(nav) nav.classList.add('active');
  const titles={overview:'Overview',pictorial:'Pictorial Board',sections:'Sections',products:'Product Register',docpreview:'Document Preview',approvals:'Approval Register',budget:'Budget & Risk',planning:'Planning',procurement:'Procurement',closeout:'Closeout',integration:'Integration Hub'};
  document.getElementById('viewTitle').textContent=titles[viewId]||viewId;
  renderCurrentView(viewId);
}
function changeRole(role) { currentRole=role; document.getElementById('navRoleBadge').textContent=ROLE_CAPABILITIES[role]?ROLE_CAPABILITIES[role].label:role; renderAll(); }
function applyFilters() { currentRoom=document.getElementById('roomFilter').value; currentPackage=document.getElementById('packageFilter').value; renderAll(); }
function renderAll() { renderOverview();renderPictorial();renderSections();renderProducts();renderDocPreview();renderApprovals();renderBudget();renderPlanning();renderProcurement();renderCloseout();renderIntegration(); }
function renderCurrentView(v) { const map={overview:renderOverview,pictorial:renderPictorial,sections:renderSections,products:renderProducts,docpreview:renderDocPreview,approvals:renderApprovals,budget:renderBudget,planning:renderPlanning,procurement:renderProcurement,closeout:renderCloseout,integration:renderIntegration}; if(map[v]) map[v](); }
function approveItem(id) { const i=SAMPLE_WORKSPACE.items.find(x=>x.id===id); if(i)i.status='approved'; closeModal(); showToast('✓ Item approved'); renderAll(); }
function rejectItem(id) { const i=SAMPLE_WORKSPACE.items.find(x=>x.id===id); if(i)i.status='rejected'; closeModal(); showToast('✗ Item rejected'); renderAll(); }
</script>
<script>
// ===== CRUD: ADD SECTION FORM =====
function openAddSectionForm() {
  const rolesOpts = ROLES_LIST.map(r=>'<option value="'+r+'">'+r+'</option>').join('');
  openModal(`
    <div class="modal-header"><div class="modal-title">Add New Section</div><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <form onsubmit="submitAddSection(event)">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Section Code</label><input class="form-input" id="secCode" placeholder="e.g. 14" required></div>
        <div class="form-group"><label class="form-label">Title</label><input class="form-input" id="secTitle" placeholder="e.g. Sanitaryware" required></div>
      </div>
      <div class="form-group"><label class="form-label">Discipline</label><input class="form-input" id="secDisc" placeholder="e.g. architecture/plumbing"></div>
      <div class="form-row-3">
        <div class="form-group"><label class="form-label">Owner Role</label><select class="form-select" id="secOwner">${rolesOpts}</select></div>
        <div class="form-group"><label class="form-label">Reviewer Role</label><select class="form-select" id="secReviewer">${rolesOpts}</select></div>
        <div class="form-group"><label class="form-label">Approver Role</label><select class="form-select" id="secApprover"><option value="client">client</option>${rolesOpts}</select></div>
      </div>
      <div class="modal-actions"><button type="submit" class="btn btn-primary">Create Section</button><button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button></div>
    </form>`);
}
function submitAddSection(e) {
  e.preventDefault();
  const sec = { id:genSectionId(), code:document.getElementById('secCode').value, title:document.getElementById('secTitle').value, discipline:document.getElementById('secDisc').value||'general', ownerRole:document.getElementById('secOwner').value, reviewerRole:document.getElementById('secReviewer').value, approverRole:document.getElementById('secApprover').value, status:'draft' };
  SAMPLE_WORKSPACE.sections.push(sec);
  closeModal(); showToast('✓ Section "'+sec.title+'" created'); renderAll();
}
// ===== CRUD: ADD ITEM / PRODUCT FORM =====
function openAddItemForm(preselectedSection) {
  const secOpts = SAMPLE_WORKSPACE.sections.map(s=>'<option value="'+s.id+'"'+(preselectedSection===s.id?' selected':'')+'>'+s.code+' — '+s.title+'</option>').join('');
  const rolesOpts = ROLES_LIST.map(r=>'<option value="'+r+'">'+r+'</option>').join('');
  const rooms = [...new Set(SAMPLE_WORKSPACE.items.map(i=>i.room))];
  const roomsList = rooms.map(r=>'<option value="'+r+'">').join('');
  const packages = [...new Set(SAMPLE_WORKSPACE.items.map(i=>i.package))];
  const pkgList = packages.map(p=>'<option value="'+p+'">').join('');
  openModal(`
    <div class="modal-header"><div class="modal-title">Add Specification Item</div><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <form onsubmit="submitAddItem(event)" style="max-height:70vh;overflow-y:auto">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Section</label><select class="form-select" id="aiSection" onchange="suggestCode()">${secOpts}</select></div>
        <div class="form-group"><label class="form-label">Item Code</label><input class="form-input" id="aiCode" placeholder="Auto-suggested" required></div>
      </div>
      <div class="form-group"><label class="form-label">Title</label><input class="form-input" id="aiTitle" placeholder="e.g. Basin mixer tap" required></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Room</label><input class="form-input" id="aiRoom" list="roomList" placeholder="Room name"><datalist id="roomList">${roomsList}</datalist></div>
        <div class="form-group"><label class="form-label">Package</label><input class="form-input" id="aiPkg" list="pkgList" placeholder="Package"><datalist id="pkgList">${pkgList}</datalist></div>
      </div>
      <div class="form-group"><label class="form-label">Image URL</label><input class="form-input" id="aiImage" placeholder="URL or leave blank for placeholder"></div>
      <div class="form-row-3">
        <div class="form-group"><label class="form-label">Supplier</label><input class="form-input" id="aiSupplier" placeholder="Supplier name"></div>
        <div class="form-group"><label class="form-label">Model</label><input class="form-input" id="aiModel" placeholder="Product model"></div>
        <div class="form-group"><label class="form-label">Finish</label><input class="form-input" id="aiFinish" placeholder="Material/finish"></div>
      </div>
      <div class="form-group"><label class="form-label">Dimensions</label><input class="form-input" id="aiDims" placeholder="e.g. 600 x 400 x 200mm"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Drawing References (comma-sep)</label><input class="form-input" id="aiDrawings" placeholder="A-100, ID-200"></div>
        <div class="form-group"><label class="form-label">Clause References (comma-sep)</label><input class="form-input" id="aiClauses" placeholder="SANS 10400-K"></div>
      </div>
      <div class="form-row-3">
        <div class="form-group"><label class="form-label">Budget Allowance (R)</label><input class="form-input" id="aiBudget" type="number" placeholder="0"></div>
        <div class="form-group"><label class="form-label">Estimated Cost (R)</label><input class="form-input" id="aiCost" type="number" placeholder="0"></div>
        <div class="form-group"><label class="form-label">Lead Time (days)</label><input class="form-input" id="aiLead" type="number" placeholder="14"></div>
      </div>
      <div class="form-check" style="margin-bottom:12px"><input type="checkbox" id="aiClientDec"><label for="aiClientDec">Requires Client Decision</label></div>
      <div class="form-row-3">
        <div class="form-group"><label class="form-label">Owner Role</label><select class="form-select" id="aiOwner">${rolesOpts}</select></div>
        <div class="form-group"><label class="form-label">Reviewer Role</label><select class="form-select" id="aiReviewer">${rolesOpts}</select></div>
        <div class="form-group"><label class="form-label">Approver Role</label><select class="form-select" id="aiApprover"><option value="client">client</option>${rolesOpts}</select></div>
      </div>
      <div class="form-group"><label class="form-label">Sustainability</label><textarea class="form-textarea" id="aiSustain" placeholder="Sustainability notes"></textarea></div>
      <div class="form-group"><label class="form-label">Warranty</label><textarea class="form-textarea" id="aiWarranty" placeholder="Warranty requirements"></textarea></div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="aiNotes" placeholder="Additional notes"></textarea></div>
      <div class="modal-actions"><button type="submit" class="btn btn-primary">Create Item</button><button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button></div>
    </form>`);
  suggestCode();
}
function suggestCode() {
  const secId = document.getElementById('aiSection').value;
  const sec = SAMPLE_WORKSPACE.sections.find(s=>s.id===secId);
  if(!sec) return;
  const prefix = sec.title.substring(0,3).toUpperCase();
  const count = SAMPLE_WORKSPACE.items.filter(i=>i.sectionId===secId).length+1;
  document.getElementById('aiCode').value = prefix+'-XX-'+String(count).padStart(3,'0');
}
function submitAddItem(e) {
  e.preventDefault();
  const placeholder = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420"><rect width="640" height="420" fill="%23162e28"/><text x="180" y="220" font-size="28" fill="%23aeefe3">New Item</text></svg>';
  const item = {
    id: genId(),
    sectionId: document.getElementById('aiSection').value,
    code: document.getElementById('aiCode').value,
    title: document.getElementById('aiTitle').value,
    room: document.getElementById('aiRoom').value || 'TBC',
    package: document.getElementById('aiPkg').value || 'General',
    discipline: 'general',
    image: document.getElementById('aiImage').value || placeholder,
    supplier: document.getElementById('aiSupplier').value || 'TBC',
    model: document.getElementById('aiModel').value || '',
    finish: document.getElementById('aiFinish').value || '',
    dimensions: document.getElementById('aiDims').value || '',
    drawingRefs: (document.getElementById('aiDrawings').value||'').split(',').map(s=>s.trim()).filter(Boolean),
    clauseRefs: (document.getElementById('aiClauses').value||'').split(',').map(s=>s.trim()).filter(Boolean),
    budgetAllowance: parseInt(document.getElementById('aiBudget').value)||0,
    estimatedCost: parseInt(document.getElementById('aiCost').value)||0,
    leadTimeDays: parseInt(document.getElementById('aiLead').value)||14,
    clientDecision: document.getElementById('aiClientDec').checked,
    ownerRole: document.getElementById('aiOwner').value,
    reviewerRole: document.getElementById('aiReviewer').value,
    approverRole: document.getElementById('aiApprover').value,
    status: 'draft',
    sourceRevision: SAMPLE_WORKSPACE.revision,
    supersededBy: null,
    sustainability: document.getElementById('aiSustain').value || '',
    warranty: document.getElementById('aiWarranty').value || '',
    notes: document.getElementById('aiNotes').value || '',
    comments: []
  };
  SAMPLE_WORKSPACE.items.push(item);
  closeModal(); showToast('✓ Item "'+item.title+'" created'); renderAll();
}
</script>
<script>
// ===== ISSUE SNAPSHOT =====

  const budget=budgetSummary(); const readiness=validateIssueReadiness();

}
function syncToOpenProject() { showToast('✓ Work packages synced to OpenProject'); }
function osNavClick(label) { showToast('Navigate to: '+label); closeOsNav(); }
</script>

<script>
// ===== RENDER FUNCTIONS =====
function renderOverview() {
  const ws=SAMPLE_WORKSPACE;
  document.getElementById('summaryName').textContent=ws.projectName;
  document.getElementById('summaryStage').textContent=ws.stage;
  document.getElementById('summaryMunicipality').textContent=ws.municipality;
  document.getElementById('summaryRevision').textContent=ws.revision;
  document.getElementById('summaryStatus').innerHTML='<span class="chip chip-'+ws.issueStatus+'">'+getStatusLabel(ws.issueStatus)+'</span>';
  const bs=budgetSummary(); const dc=bs.delta>0?'var(--danger)':'var(--green)';
  document.getElementById('budgetSummaryOverview').innerHTML='<div class="stats-grid"><div class="stat-card"><div class="stat-value">'+formatCurrency(bs.totalAllowance)+'</div><div class="stat-label">Allowance</div></div><div class="stat-card"><div class="stat-value">'+formatCurrency(bs.totalEstimate)+'</div><div class="stat-label">Estimate</div></div><div class="stat-card"><div class="stat-value" style="color:'+dc+'">'+(bs.delta>0?'+':'')+bs.deltaPct+'%</div><div class="stat-label">Delta</div></div><div class="stat-card"><div class="stat-value" style="color:var(--amber)">'+bs.longLeadCount+'</div><div class="stat-label">Long-Lead</div></div><div class="stat-card"><div class="stat-value" style="color:var(--danger)">'+bs.staleCount+'</div><div class="stat-label">Stale</div></div></div>';
  const findings=validateIssueReadiness();
  document.getElementById('readinessFindings').innerHTML=findings.map(f=>'<div style="display:flex;gap:8px;margin-bottom:8px;padding:8px;background:var(--panel-bg);border-radius:var(--radius-sm);border-left:3px solid '+(f.severity==='blocker'?'var(--danger)':f.severity==='high'?'var(--amber)':'var(--green)')+'"><span class="chip chip-'+f.severity+'">'+f.severity+'</span><div><div style="font-size:11px">'+f.message+'</div>'+(f.items.length?'<div style="font-size:9px;color:var(--text-low);font-family:monospace;margin-top:2px">'+f.items.join(', ')+'</div>':'')+'</div></div>').join('');
  const items=SAMPLE_WORKSPACE.items; const sc={}; items.forEach(i=>{sc[i.status]=(sc[i.status]||0)+1;});
  let sh=''; Object.entries(sc).forEach(([k,v])=>{sh+='<div class="stat-card"><div class="stat-value">'+v+'</div><div class="stat-label">'+getStatusLabel(k)+'</div></div>';}); ws.sections.forEach(s=>{const c=items.filter(i=>i.sectionId===s.id).length; sh+='<div class="stat-card"><div class="stat-value">'+c+'</div><div class="stat-label">'+s.title+'</div></div>';});
  document.getElementById('quickStats').innerHTML=sh;
}
</script>

<script>
function renderPictorial() {
  const items=visibleItemsForRole(currentRole);
  const grid=document.getElementById('pictorialGrid');
  let html=items.map(item=>{
    const bd=item.estimatedCost-item.budgetAllowance; const bp=((bd/Math.max(item.budgetAllowance,1))*100).toFixed(1);
    const bc=bd>0?(bd/item.budgetAllowance>0.1?'over':'warn'):'under';
    const ll=item.leadTimeDays>42; const flags=[];
    if(item.supersededBy) flags.push({l:'Superseded',c:'badge-red'});
    if(ll) flags.push({l:item.leadTimeDays+'d',c:'badge-amber'});
    if(bd>0) flags.push({l:'Over',c:'badge-red'});
    if(item.clientDecision&&item.status!=='approved') flags.push({l:'Client',c:'badge-gold'});
    return '<div class="pic-card" onclick="openItemDetail(\''+item.id+'\')"><img class="pic-card-img" src="'+item.image+'" alt="'+item.title+'"><div class="pic-card-body"><div class="pic-card-title">'+item.title+'</div><div class="pic-card-code">'+item.code+'</div><div class="pic-card-meta"><span class="badge">'+item.room+'</span><span class="badge">'+item.package+'</span><span class="chip chip-'+item.status+'">'+getStatusLabel(item.status)+'</span></div>'+(flags.length?'<div class="risk-flags">'+flags.map(f=>'<span class="badge '+f.c+'">'+f.l+'</span>').join('')+'</div>':'')+'<div class="pic-card-footer"><span class="pic-budget '+bc+'">'+(bd>0?'+':'')+formatCurrency(bd)+'</span><span class="pic-leadtime'+(ll?' long':'')+'">'+item.leadTimeDays+'d</span></div></div></div>';
  }).join('');
  html+='<div class="pic-card-add" onclick="openAddItemForm()"><div class="plus">+</div><div class="add-label">Add new item</div></div>';
  grid.innerHTML=html;
}
function openItemDetail(itemId) {
  const item=SAMPLE_WORKSPACE.items.find(i=>i.id===itemId); if(!item) return;
  let act='';
  if(canEdit(item)) act+='<button class="btn btn-primary" onclick="showToast(\'Edit mode — prototype\')">Edit</button>';
  if(canApprove(item)){act+='<button class="btn btn-primary" onclick="approveItem(\''+item.id+'\')">Approve</button>';act+='<button class="btn btn-danger" onclick="rejectItem(\''+item.id+'\')">Reject</button>';}
  if(canReview(item)) act+='<button class="btn btn-secondary" onclick="showToast(\'Issue flagged\')">Flag</button>';
  if(canRequestSubstitution()) act+='<button class="btn btn-secondary" onclick="showToast(\'Substitution requested\')">Sub</button>';
  act+='<button class="btn btn-secondary" onclick="showToast(\'Comment added\')">💬</button>';
  const comments=(item.comments||[]).map(c=>'<div style="padding:5px 8px;margin-bottom:3px;background:var(--panel-bg);border-radius:var(--radius-sm);border-left:2px solid var(--glass-border)"><div style="display:flex;justify-content:space-between"><span style="font-size:9px;font-weight:600;color:var(--secondary)">'+c.user+'</span><span style="font-size:8px;color:var(--text-low)">'+c.time+'</span></div><div style="font-size:10px;color:var(--text-muted)">'+c.text+'</div></div>').join('')||'<p style="font-size:9px;color:var(--text-low)">No comments.</p>';
  openModal('<div class="modal-header"><div><div class="modal-title">'+item.title+'</div><div style="font-size:9px;color:var(--text-low);font-family:monospace">'+item.code+'</div></div><button class="modal-close" onclick="closeModal()">&times;</button></div><img src="'+item.image+'" style="width:100%;height:140px;object-fit:cover;border-radius:var(--radius-sm);margin-bottom:10px;border:1px solid var(--glass-border)"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="modal-field"><div class="modal-field-label">Room</div><div class="modal-field-value">'+item.room+'</div></div><div class="modal-field"><div class="modal-field-label">Package</div><div class="modal-field-value">'+item.package+'</div></div><div class="modal-field"><div class="modal-field-label">Supplier</div><div class="modal-field-value">'+item.supplier+'</div></div><div class="modal-field"><div class="modal-field-label">Model</div><div class="modal-field-value">'+(item.model||'—')+'</div></div><div class="modal-field"><div class="modal-field-label">Finish</div><div class="modal-field-value">'+(item.finish||'—')+'</div></div><div class="modal-field"><div class="modal-field-label">Dims</div><div class="modal-field-value">'+(item.dimensions||'—')+'</div></div><div class="modal-field"><div class="modal-field-label">Budget</div><div class="modal-field-value">'+formatCurrency(item.budgetAllowance)+'</div></div><div class="modal-field"><div class="modal-field-label">Estimate</div><div class="modal-field-value" style="color:'+(item.estimatedCost>item.budgetAllowance?'var(--danger)':'inherit')+'">'+formatCurrency(item.estimatedCost)+'</div></div><div class="modal-field"><div class="modal-field-label">Lead Time</div><div class="modal-field-value">'+item.leadTimeDays+' days</div></div><div class="modal-field"><div class="modal-field-label">Status</div><div class="modal-field-value"><span class="chip chip-'+item.status+'">'+getStatusLabel(item.status)+'</span></div></div></div><div class="modal-field"><div class="modal-field-label">Drawing Refs</div><div class="modal-field-value">'+item.drawingRefs.join(', ')+'</div></div><div class="modal-field"><div class="modal-field-label">Notes</div><div class="modal-field-value">'+(item.notes||'—')+'</div></div><div style="margin-top:8px"><div class="modal-field-label">Comments ('+item.comments.length+')</div><div style="margin-top:4px">'+comments+'</div></div><div class="modal-actions">'+act+'</div>');
}
</script>

<script>
function renderSections() {
  const ws=SAMPLE_WORKSPACE; const c=document.getElementById('sectionsList');
  c.innerHTML=ws.sections.map(s=>{
    const si=ws.items.filter(i=>i.sectionId===s.id);
    return '<div class="section-row" onclick="this.classList.toggle(\'expanded\')"><div class="section-code">'+s.code+'</div><div class="section-info"><div class="section-title">'+s.title+'</div><div class="section-discipline">'+s.discipline+' · '+s.ownerRole+'</div></div><span class="chip chip-'+s.status+'">'+getStatusLabel(s.status)+'</span><span class="section-count">'+si.length+'</span></div><div class="section-items">'+si.map(i=>'<div class="section-item-row" onclick="event.stopPropagation();openItemDetail(\''+i.id+'\')"><span style="color:var(--text-low);font-family:monospace;font-size:9px">'+i.code+'</span><span style="flex:1">'+i.title+'</span><span class="chip chip-'+i.status+'">'+getStatusLabel(i.status)+'</span></div>').join('')+'</div>';
  }).join('');
}
function renderProducts() {
  const items=visibleItemsForRole(currentRole); const c=document.getElementById('productsList');
  c.innerHTML='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:10px"><thead><tr style="border-bottom:1px solid var(--glass-border)"><th style="text-align:left;padding:5px;color:var(--text-low)">Code</th><th style="text-align:left;padding:5px;color:var(--text-low)">Title</th><th style="text-align:left;padding:5px;color:var(--text-low)">Room</th><th style="text-align:right;padding:5px;color:var(--text-low)">Budget</th><th style="text-align:right;padding:5px;color:var(--text-low)">Est</th><th style="text-align:center;padding:5px;color:var(--text-low)">Status</th></tr></thead><tbody>'+items.map(i=>'<tr style="border-bottom:1px solid var(--glass-border);cursor:pointer" onclick="openItemDetail(\''+i.id+'\')" onmouseenter="this.style.background=\'rgba(174,239,227,0.03)\'" onmouseleave="this.style.background=\'\'"><td style="padding:5px;font-family:monospace;color:var(--primary-light)">'+i.code+'</td><td style="padding:5px">'+i.title+'</td><td style="padding:5px;color:var(--text-muted)">'+i.room+'</td><td style="padding:5px;text-align:right;color:var(--text-muted)">'+formatCurrency(i.budgetAllowance)+'</td><td style="padding:5px;text-align:right;color:'+(i.estimatedCost>i.budgetAllowance?'var(--danger)':'var(--text-primary)')+'">'+formatCurrency(i.estimatedCost)+'</td><td style="padding:5px;text-align:center"><span class="chip chip-'+i.status+'">'+getStatusLabel(i.status)+'</span></td></tr>').join('')+'</tbody></table></div>';
}
function renderDocPreview() {
  const ws=SAMPLE_WORKSPACE;
  let h='<div style="border:1px solid var(--glass-border);border-radius:var(--radius);padding:16px;background:var(--bg-deep)"><div style="text-align:center;border-bottom:2px solid var(--primary-light);padding-bottom:10px;margin-bottom:14px"><div style="font-family:var(--font-heading);font-size:14px;font-weight:700;color:var(--secondary)">'+ws.projectName+'</div><div style="font-size:10px;color:var(--text-muted);margin-top:2px">SPECIFICATION — Rev '+ws.revision+'</div></div>';
  ws.sections.forEach(s=>{const si=ws.items.filter(i=>i.sectionId===s.id); h+='<div style="margin-bottom:14px"><div style="font-family:var(--font-heading);font-size:11px;font-weight:700;color:var(--primary-light);border-bottom:1px solid var(--glass-border);padding-bottom:3px;margin-bottom:6px">Section '+s.code+' — '+s.title+'</div>'+si.map(i=>'<div style="margin-bottom:8px;padding-left:10px;border-left:2px solid var(--glass-border)"><div style="font-weight:600;font-size:10px">'+i.code+' · '+i.title+'</div><div style="font-size:9px;color:var(--text-muted);margin-top:2px">'+i.supplier+' · '+i.model+' · '+i.finish+'</div></div>').join('')+'</div>';});
  h+='</div>'; document.getElementById('docPreviewContent').innerHTML=h;
}
function renderApprovals() {
  const items=SAMPLE_WORKSPACE.items; let ai;
  if(currentRole==='client') ai=items.filter(i=>i.clientDecision&&i.status!=='approved');
  else if(['contractor','subcontractor'].includes(currentRole)) ai=items.filter(i=>i.reviewerRole===currentRole&&i.status!=='approved');
  else ai=items.filter(i=>i.status!=='approved');
  document.getElementById('approvalRoleNote').textContent='Showing items relevant to your role.';
  document.getElementById('approvalsList').innerHTML=ai.length===0?'<p style="font-size:10px;color:var(--text-low)">No pending approvals.</p>':ai.map(i=>'<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--glass-border);border-radius:var(--radius-sm);margin-bottom:4px;background:var(--panel-bg)"><div style="width:3px;height:26px;border-radius:2px;background:'+(i.status==='needs_decision'?'var(--gold)':'var(--text-low)')+'"></div><div style="flex:1"><div style="font-size:11px;font-weight:500">'+i.title+'</div><div style="font-size:9px;color:var(--text-low)">'+i.code+' · '+i.room+'</div></div><span class="chip chip-'+i.status+'">'+getStatusLabel(i.status)+'</span><div style="display:flex;gap:3px">'+(canApprove(i)?'<button class="btn btn-primary" onclick="approveItem(\''+i.id+'\')">✓</button><button class="btn btn-danger" onclick="rejectItem(\''+i.id+'\')">✗</button>':'')+(canReview(i)?'<button class="btn btn-secondary" onclick="showToast(\'Flagged\')">Flag</button>':'')+'</div></div>').join('');
  document.getElementById('professionalPanel').style.display=(currentRole==='architect'||currentRole==='bep')?'block':'none';
}
</script>

<script>
function renderBudget() {
  const items=SAMPLE_WORKSPACE.items; const mx=Math.max(...items.map(i=>Math.max(i.budgetAllowance,i.estimatedCost)));
  document.getElementById('budgetBars').innerHTML=items.map(i=>{const ap=(i.budgetAllowance/mx*100).toFixed(1);const ep=(i.estimatedCost/mx*100).toFixed(1);const ov=i.estimatedCost>i.budgetAllowance;return '<div class="budget-bar-container"><div class="budget-bar-label"><span style="font-weight:500;font-size:10px">'+i.title+'</span><span style="color:'+(ov?'var(--danger)':'var(--text-muted)')+';font-size:10px">'+formatCurrency(i.estimatedCost)+' / '+formatCurrency(i.budgetAllowance)+'</span></div><div class="budget-bar-track"><div class="budget-bar-fill" style="width:'+ep+'%;background:'+(ov?'var(--danger)':'var(--primary-light)')+'"></div><div style="position:absolute;left:'+ap+'%;top:0;height:100%;border-right:2px dashed var(--gold)"></div></div></div>';}).join('');
  const oi=items.filter(i=>i.estimatedCost>i.budgetAllowance);
  document.getElementById('overBudgetItems').innerHTML=oi.length===0?'<p style="color:var(--green);font-size:10px">All within budget.</p>':oi.map(i=>'<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;margin-bottom:4px;background:rgba(217,87,71,0.05);border-radius:var(--radius-sm);border:1px solid rgba(217,87,71,0.15)"><span style="font-family:monospace;font-size:9px;color:var(--danger)">'+i.code+'</span><span style="flex:1;font-size:10px">'+i.title+'</span><span style="font-size:10px;color:var(--danger);font-weight:600">+'+formatCurrency(i.estimatedCost-i.budgetAllowance)+'</span></div>').join('');
  const ll=items.filter(i=>i.leadTimeDays>30).sort((a,b)=>b.leadTimeDays-a.leadTimeDays); const ml=Math.max(...ll.map(i=>i.leadTimeDays));
  document.getElementById('longLeadItems').innerHTML=ll.map(i=>{const p=(i.leadTimeDays/ml*100).toFixed(0);const cl=i.leadTimeDays>60?'var(--danger)':i.leadTimeDays>42?'var(--amber)':'var(--primary-light)';return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px"><span style="min-width:60px;font-size:9px;font-family:monospace;color:var(--text-low)">'+i.code+'</span><div style="flex:1;height:5px;background:var(--card-bg);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+p+'%;background:'+cl+';border-radius:3px"></div></div><span style="min-width:35px;text-align:right;font-size:9px;color:'+cl+';font-weight:600">'+i.leadTimeDays+'d</span></div>';}).join('');
  const stale=items.filter(i=>i.supersededBy);
  document.getElementById('staleWarnings').innerHTML=stale.length===0?'<p style="color:var(--green);font-size:10px">No stale refs.</p>':stale.map(i=>'<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;margin-bottom:4px;background:rgba(245,166,35,0.05);border-radius:var(--radius-sm);border:1px solid rgba(245,166,35,0.15)"><span class="badge badge-amber">Superseded</span><span style="flex:1;font-size:10px">'+i.title+'</span><span style="font-size:9px;color:var(--text-low)">→ '+i.supersededBy+'</span></div>').join('');
}
function renderPlanning() {
  const items=SAMPLE_WORKSPACE.items;
  const pkgs=items.map(i=>({subject:'Procure: '+i.title,status:i.status==='approved'?'In Progress':'New',priority:i.leadTimeDays>60?'High':'Normal',assignee:i.ownerRole}));
  const cols={'New':[],'In Progress':[],'Done':[]};
  pkgs.forEach(p=>{(cols[p.status]||cols['New']).push(p);});
  document.getElementById('kanbanBoard').innerHTML=Object.entries(cols).map(([s,cards])=>'<div class="kanban-column"><div class="kanban-col-title">'+s+' ('+cards.length+')</div>'+cards.map(c=>'<div class="kanban-card"><div class="kanban-card-title">'+c.subject+'</div><div class="kanban-card-meta"><span class="badge" style="margin-right:3px">'+c.priority+'</span>'+c.assignee+'</div></div>').join('')+'</div>').join('');
}
function renderProcurement() {
  const items=[...SAMPLE_WORKSPACE.items].sort((a,b)=>b.leadTimeDays-a.leadTimeDays);
  const today=new Date();
  document.getElementById('procurementList').innerHTML=items.map(i=>{const obd=new Date(today.getTime()+(i.leadTimeDays*86400000));const uc=i.leadTimeDays>60?'var(--danger)':i.leadTimeDays>42?'var(--amber)':'var(--primary-light)';return '<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--glass-border);border-radius:var(--radius-sm);margin-bottom:5px;background:var(--panel-bg);border-left:3px solid '+uc+'"><div style="min-width:40px;text-align:center"><div style="font-family:var(--font-heading);font-size:16px;font-weight:700;color:'+uc+'">'+i.leadTimeDays+'</div><div style="font-size:8px;color:var(--text-low)">days</div></div><div style="flex:1"><div style="font-weight:500;font-size:11px">'+i.title+'</div><div style="font-size:9px;color:var(--text-low)">'+i.supplier+' · '+i.code+' · By: '+obd.toLocaleDateString('en-ZA')+'</div></div><span class="chip chip-'+i.status+'">'+getStatusLabel(i.status)+'</span><span style="font-size:10px;color:var(--text-muted)">'+formatCurrency(i.estimatedCost)+'</span></div>';}).join('');
}
function renderCloseout() {
  const items=SAMPLE_WORKSPACE.items; const ap=items.filter(i=>i.status==='approved').length; const t=items.length; const pct=((ap/t)*100).toFixed(0); const bs=budgetSummary();
  const allA=ap===t; const wb=bs.delta<=0; const ns=bs.staleCount===0; const ready=allA&&wb&&ns;
  document.getElementById('closeoutStatus').innerHTML='<div class="stats-grid" style="margin-bottom:14px"><div class="stat-card"><div class="stat-value" style="color:'+(allA?'var(--green)':'var(--amber)')+'">'+pct+'%</div><div class="stat-label">Approved</div></div><div class="stat-card"><div class="stat-value" style="color:'+(wb?'var(--green)':'var(--danger)') +'">'+(wb?'✓':'✗')+'</div><div class="stat-label">Budget</div></div><div class="stat-card"><div class="stat-value" style="color:'+(ns?'var(--green)':'var(--danger)')+'">'+(ns?'✓':'✗')+'</div><div class="stat-label">No Stale</div></div></div><div style="padding:12px;border-radius:var(--radius-sm);border:1px solid '+(ready?'var(--green)':'var(--amber)')+';background:'+(ready?'rgba(74,222,128,0.06)':'rgba(245,166,35,0.06)')+'"><div style="font-weight:600;font-size:11px;color:'+(ready?'var(--green)':'var(--amber)')+'">'+(ready?'Ready for Issue':'Not Ready')+'</div><div style="font-size:10px;color:var(--text-muted);margin-top:3px">'+(ready?'All clear.':(t-ap)+' pending. '+(bs.delta>0?'Over by '+formatCurrency(bs.delta)+'. ':''))+'</div></div>';
}
</script>

<script>
function renderIntegration() {
  const bs=budgetSummary(); const items=SAMPLE_WORKSPACE.items;
  const pd=items.filter(i=>i.clientDecision&&i.status!=='approved').length;
  const tc=items.reduce((s,i)=>s+(i.comments||[]).length,0);
  document.getElementById('integrationGrid').innerHTML=`
    <div class="integration-card"><div class="integration-card-title"><span class="sd"></span>Project Passport</div><div class="integration-metric"><span class="label">Status</span><span class="value"><span class="chip chip-draft">Draft P01</span></span></div><div class="integration-metric"><span class="label">Open Decisions</span><span class="value" style="color:var(--gold)">${pd}</span></div><div class="integration-metric"><span class="label">Budget Delta</span><span class="value" style="color:${bs.delta>0?'var(--danger)':'var(--green)'}">${ bs.delta>0?'+':''}${bs.deltaPct}%</span></div></div>
    <div class="integration-card"><div class="integration-card-title"><span class="sd"></span>AI Agent Recommendations</div><div class="ai-rec-card"><div class="ai-label">🤖 Recommendation</div><div style="font-size:10px">${pd} client decisions pending — send reminder</div></div><div class="ai-rec-card"><div class="ai-label">🤖 Early Procurement</div><div style="font-size:10px">Feature pendant: 84-day lead — issue RFQ now</div></div><div class="ai-rec-card"><div class="ai-label">🤖 Budget</div><div style="font-size:10px">2 items over allowance by ${formatCurrency(Math.abs(bs.delta))}</div></div></div>
    <div class="integration-card"><div class="integration-card-title"><span class="sd warn"></span>Messaging Centre</div><div class="integration-metric"><span class="label">Comments</span><span class="value">${tc} across items</span></div><div class="integration-metric"><span class="label">Unread</span><span class="value" style="color:var(--gold)">2</span></div><div class="connection-line">Comments → Action Centre</div><div class="connection-line">Approvals → inbox cards</div></div>
    <div class="integration-card"><div class="integration-card-title"><span class="sd"></span>Payment & Escrow</div><div class="integration-metric"><span class="label">Total Budget</span><span class="value">${formatCurrency(bs.totalAllowance)}</span></div><div class="integration-metric"><span class="label">Milestones</span><span class="value">${items.length} linked</span></div><div class="integration-metric"><span class="label">Unlock</span><span class="value">Issued + Delivered</span></div></div>
    <div class="integration-card"><div class="integration-card-title"><span class="sd"></span>Procurement / RFQ</div><div class="connection-line">Issued → RFQ packages</div><div class="connection-line">Quotes → Purchase orders</div><div class="integration-metric"><span class="label">Ready for RFQ</span><span class="value">${items.filter(i=>i.status==='approved').length} items</span></div><div class="integration-metric"><span class="label">Pending</span><span class="value">${items.filter(i=>i.status!=='approved').length} items</span></div></div>
    <div class="integration-card"><div class="integration-card-title"><span class="sd"></span>Programme / Gantt</div><div class="integration-metric"><span class="label">Sync</span><span class="value" style="color:var(--green)">✓ Connected</span></div><div class="integration-metric"><span class="label">Work Pkgs</span><span class="value">${items.length*2} generated</span></div><div class="connection-line">Long-lead → planning constraints</div></div>
    <div class="integration-card"><div class="integration-card-title"><span class="sd warn"></span>Drawing Register</div><div class="integration-metric"><span class="label">Referenced</span><span class="value">${items.reduce((s,i)=>s+i.drawingRefs.length,0)} drawings</span></div><div class="integration-metric"><span class="label">Superseded</span><span class="value" style="color:var(--danger)">${items.filter(i=>i.supersededBy).length} → stale</span></div></div>
    <div class="integration-card"><div class="integration-card-title"><span class="sd"></span>Site Execution</div><div class="integration-metric"><span class="label">Installed</span><span class="value">0 / ${items.length}</span></div><div class="connection-line">Install confirm → payment unlock</div><div class="connection-line">Evidence → closeout readiness</div></div>
    <div class="integration-card"><div class="integration-card-title"><span class="sd"></span>Audit Trail</div><div style="padding:8px;background:var(--bg-deep);border-radius:var(--radius-sm);border:1px solid var(--glass-border);font-family:monospace;font-size:8px;color:var(--secondary);max-height:120px;overflow-y:auto"><div>[${new Date(Date.now()-3600000).toISOString().slice(0,19)}] ITEM_APPROVED · FFE-CH-001</div><div>[${new Date(Date.now()-7200000).toISOString().slice(0,19)}] COMMENT · FIN-WT-001</div><div>[${new Date(Date.now()-10800000).toISOString().slice(0,19)}] ITEM_CREATED · LGT-PD-001</div><div>[${new Date(Date.now()-14400000).toISOString().slice(0,19)}] SECTION_CREATED · sec-joinery</div></div></div>
  `;
}
</script>
<script>
// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  buildShell();
  renderAll();
});
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
</script>
</body>
