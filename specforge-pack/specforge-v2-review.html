<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpecForge V2 — Architex OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d2520; --bg-deep: #081a16; --bg-os-nav: #061410;
  --primary: #005b4e; --primary-light: #007666; --secondary: #aeefe3;
  --text-primary: #ffffff; --text-muted: rgba(255,255,255,0.62);
  --text-low: rgba(255,255,255,0.42);
  --glass-bg: rgba(255,255,255,0.07); --glass-border: rgba(174,239,227,0.24);
  --glass-glow: rgba(0,118,102,0.38);
  --panel-bg: rgba(255,255,255,0.05); --card-bg: #11302a;
  --btn-gradient: linear-gradient(180deg, #c5f6d4, #aeefe3); --btn-text: #00201b;
  --gold: #F1D39A; --danger: #d95747; --green: #4ADE80; --amber: #F5A623;
  --grid-lines: rgba(174,239,227,0.06); --radius: 10px; --radius-sm: 6px;
  --font-heading: 'Space Grotesk', sans-serif; --font-body: 'Inter', sans-serif;
  --os-nav-width: 56px; --tool-nav-width: 200px; --topbar-height: 36px;
  --input-bg: rgba(255,255,255,0.06); --input-border: rgba(174,239,227,0.2);
  --input-focus: rgba(174,239,227,0.5);
}
html, body { height:100%; background:var(--bg); color:var(--text-primary); font-family:var(--font-body); font-size:14px; line-height:1.5; overflow:hidden; }
body::before { content:''; position:fixed; inset:0; background: radial-gradient(ellipse 60% 50% at 30% 40%, var(--glass-glow) 0%, transparent 70%), radial-gradient(ellipse 40% 40% at 75% 60%, rgba(174,239,227,0.04) 0%, transparent 60%); pointer-events:none; z-index:0; }
body::after { content:''; position:fixed; inset:0; background-image: linear-gradient(var(--grid-lines) 1px, transparent 1px), linear-gradient(90deg, var(--grid-lines) 1px, transparent 1px); background-size:56px 56px; pointer-events:none; z-index:0; }
.app-shell { display:grid; grid-template-columns:var(--os-nav-width) var(--tool-nav-width) 1fr; grid-template-rows:var(--topbar-height) 1fr; height:100vh; position:relative; z-index:1; }
.os-nav { grid-row:1/-1; background:var(--bg-os-nav); border-right:1px solid rgba(174,239,227,0.12); display:flex; flex-direction:column; align-items:center; padding:12px 0; position:relative; z-index:100; }
.os-nav-logo { width:32px; height:32px; margin-bottom:20px; cursor:pointer; color:var(--secondary); }
.os-nav-logo svg { width:100%; height:100%; }
.os-nav-items { display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; }
.os-nav-item { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:var(--text-low); cursor:pointer; transition:all 0.2s; position:relative; }
.os-nav-item:hover { background:rgba(174,239,227,0.08); color:var(--text-primary); }
.os-nav-item.active { color:var(--secondary); }
.os-nav-item.active::after { content:''; position:absolute; right:-2px; top:50%; transform:translateY(-50%); width:4px; height:4px; border-radius:50%; background:var(--secondary); box-shadow:0 0 6px var(--secondary); }
.os-nav-item svg { width:20px; height:20px; }
.os-nav-item .tip { position:absolute; left:52px; top:50%; transform:translateY(-50%); background:var(--card-bg); border:1px solid var(--glass-border); border-radius:var(--radius-sm); padding:3px 8px; font-size:10px; color:var(--text-primary); white-space:nowrap; opacity:0; pointer-events:none; transition:opacity 0.2s; z-index:200; }
.os-nav-item:hover .tip { opacity:1; }
.os-nav-expanded-overlay { position:fixed; left:0; top:0; bottom:0; width:240px; background:var(--bg-os-nav); border-right:1px solid rgba(174,239,227,0.15); z-index:500; padding:16px; display:none; flex-direction:column; box-shadow:8px 0 32px rgba(0,0,0,0.5); }
.os-nav-expanded-overlay.open { display:flex; }
.os-exp-header { display:flex; align-items:center; gap:10px; margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid rgba(174,239,227,0.12); }
.os-exp-header .logo-text { font-family:var(--font-heading); font-size:16px; font-weight:700; color:var(--secondary); }
.os-exp-close { margin-left:auto; background:none; border:none; color:var(--text-low); cursor:pointer; font-size:18px; }
.os-exp-user { padding:10px; background:rgba(174,239,227,0.06); border-radius:var(--radius-sm); margin-bottom:14px; border:1px solid rgba(174,239,227,0.1); }
.os-exp-user .name { font-size:12px; font-weight:600; }
.os-exp-user .project { font-size:10px; color:var(--text-low); margin-top:2px; }
.os-exp-item { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:var(--radius-sm); color:var(--text-muted); cursor:pointer; font-size:12px; transition:all 0.2s; }
.os-exp-item:hover { background:rgba(174,239,227,0.06); color:var(--text-primary); }
.os-exp-item.active { color:var(--secondary); background:rgba(174,239,227,0.08); }
.os-exp-item svg { width:16px; height:16px; flex-shrink:0; }
.os-backdrop { position:fixed; inset:0; background:rgba(4,12,10,0.4); z-index:499; display:none; }
.os-backdrop.open { display:block; }
.tool-nav { grid-row:1/-1; background:var(--glass-bg); border-right:1px solid var(--glass-border); backdrop-filter:blur(16px); display:flex; flex-direction:column; overflow-y:auto; padding:10px 0; position:relative; }
.tool-nav::-webkit-scrollbar { width:4px; }
.tool-nav::-webkit-scrollbar-thumb { background:var(--glass-border); border-radius:2px; }
.tool-nav-header { padding:6px 12px 12px; border-bottom:1px solid var(--glass-border); margin-bottom:6px; }
.tool-nav-header h2 { font-family:var(--font-heading); font-size:15px; font-weight:700; color:var(--secondary); }
.tool-nav-header .sub { font-size:9px; color:var(--text-low); text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
.tool-nav-back { display:flex; align-items:center; gap:5px; padding:5px 12px; font-size:10px; color:var(--text-low); cursor:pointer; transition:color 0.2s; margin-bottom:6px; }
.tool-nav-back:hover { color:var(--secondary); }
.nav-role-badge { margin:0 8px 8px; padding:5px 8px; background:rgba(174,239,227,0.08); border:1px solid rgba(174,239,227,0.15); border-radius:var(--radius-sm); font-size:9px; color:var(--secondary); font-weight:500; }
.nav-section-label { padding:8px 12px 3px; font-size:8px; text-transform:uppercase; letter-spacing:1.2px; color:var(--text-low); font-weight:600; }
.nav-item { display:flex; align-items:center; gap:7px; padding:6px 12px; cursor:pointer; color:var(--text-muted); font-size:11px; transition:all 0.2s; border-left:3px solid transparent; }
.nav-item:hover { color:var(--text-primary); background:rgba(174,239,227,0.05); border-left-color:rgba(174,239,227,0.3); }
.nav-item.active { color:var(--secondary); background:rgba(174,239,227,0.08); border-left-color:var(--secondary); font-weight:500; }
.nav-item svg { width:13px; height:13px; flex-shrink:0; opacity:0.7; }
.nav-item.active svg { opacity:1; }
.top-bar { background:var(--bg-os-nav); border-bottom:1px solid var(--glass-border); display:flex; align-items:center; padding:0 16px; gap:10px; font-size:11px; }
.breadcrumb { color:var(--text-low); }
.breadcrumb .sep { color:rgba(174,239,227,0.3); margin:0 4px; }
.breadcrumb .cur { color:var(--secondary); font-weight:500; }
.top-bar-spacer { flex:1; }
.filter-select { background:var(--card-bg); border:1px solid var(--glass-border); border-radius:var(--radius-sm); color:var(--text-muted); padding:3px 7px; font-size:10px; font-family:var(--font-body); cursor:pointer; outline:none; }
.filter-select:focus { border-color:var(--secondary); }
.filter-select option { background:var(--card-bg); color:var(--text-primary); }
.btn { display:inline-flex; align-items:center; gap:4px; padding:5px 10px; border-radius:var(--radius-sm); font-size:10px; font-weight:500; font-family:var(--font-body); cursor:pointer; transition:all 0.2s; border:none; white-space:nowrap; }
.btn-primary { background:var(--btn-gradient); color:var(--btn-text); font-weight:600; }
.btn-primary:hover { box-shadow:0 0 14px rgba(174,239,227,0.4); transform:translateY(-1px); }
.btn-gold { background:var(--gold); color:var(--btn-text); font-weight:600; }
.btn-gold:hover { background:#f8e0b0; box-shadow:0 0 14px rgba(241,211,154,0.4); }
.btn-secondary { background:transparent; color:var(--text-muted); border:1px solid var(--glass-border); }
.btn-secondary:hover { border-color:var(--secondary); color:var(--text-primary); }
.btn-danger { background:rgba(217,87,71,0.15); color:var(--danger); border:1px solid rgba(217,87,71,0.3); }
.btn-danger:hover { background:rgba(217,87,71,0.25); }
.main-content { overflow-y:auto; padding:18px; position:relative; }
.main-content::-webkit-scrollbar { width:5px; }
.main-content::-webkit-scrollbar-thumb { background:var(--glass-border); border-radius:3px; }
.panel { background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:var(--radius); backdrop-filter:blur(16px); padding:16px; margin-bottom:14px; transition:border-color 0.3s; position:relative; }
.panel:hover { border-color:rgba(174,239,227,0.4); }
.panel-title { font-family:var(--font-heading); font-size:12px; font-weight:600; color:var(--text-primary); margin-bottom:10px; display:flex; align-items:center; gap:7px; }
.panel-title .dot { width:5px; height:5px; border-radius:50%; background:var(--secondary); }
.panel-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.chip { display:inline-flex; align-items:center; padding:2px 6px; border-radius:4px; font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:0.4px; }
.chip-draft { background:rgba(255,255,255,0.08); color:var(--text-muted); }
.chip-approved { background:rgba(74,222,128,0.15); color:var(--green); }
.chip-needs_decision { background:rgba(241,211,154,0.2); color:var(--gold); }
.chip-rejected { background:rgba(217,87,71,0.15); color:var(--danger); }
.chip-blocker { background:rgba(217,87,71,0.2); color:var(--danger); }
.chip-high { background:rgba(245,166,35,0.2); color:var(--amber); }
.chip-medium { background:rgba(241,211,154,0.15); color:var(--gold); }
.chip-ok { background:rgba(74,222,128,0.12); color:var(--green); }
.badge { display:inline-flex; align-items:center; padding:2px 5px; border-radius:3px; font-size:9px; font-weight:500; background:rgba(174,239,227,0.1); color:var(--secondary); border:1px solid rgba(174,239,227,0.15); }
.badge-gold { background:rgba(241,211,154,0.1); color:var(--gold); border-color:rgba(241,211,154,0.2); }
.badge-red { background:rgba(217,87,71,0.1); color:var(--danger); border-color:rgba(217,87,71,0.2); }
.badge-amber { background:rgba(245,166,35,0.1); color:var(--amber); border-color:rgba(245,166,35,0.2); }
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(120px,1fr)); gap:8px; }
.stat-card { background:var(--panel-bg); border:1px solid var(--glass-border); border-radius:var(--radius-sm); padding:10px; text-align:center; }
.stat-value { font-family:var(--font-heading); font-size:20px; font-weight:700; color:var(--secondary); }
.stat-label { font-size:9px; color:var(--text-low); margin-top:2px; }
.pictorial-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr)); gap:12px; }
.pic-card { background:var(--card-bg); border:1px solid var(--glass-border); border-radius:var(--radius); overflow:hidden; transition:all 0.25s; cursor:pointer; }
.pic-card:hover { border-color:rgba(174,239,227,0.4); box-shadow:0 6px 24px rgba(0,118,102,0.15); transform:translateY(-2px); }
.pic-card-img { width:100%; height:130px; object-fit:cover; display:block; border-bottom:1px solid var(--glass-border); }
.pic-card-body { padding:10px; }
.pic-card-title { font-family:var(--font-heading); font-size:12px; font-weight:600; margin-bottom:3px; }
.pic-card-code { font-size:9px; color:var(--text-low); font-family:monospace; margin-bottom:5px; }
.pic-card-meta { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:6px; }
.pic-card-footer { display:flex; align-items:center; justify-content:space-between; padding-top:6px; border-top:1px solid var(--glass-border); }
.pic-budget { font-size:9px; font-weight:600; }
.pic-budget.over { color:var(--danger); }
.pic-budget.under { color:var(--green); }
.pic-budget.warn { color:var(--amber); }
.pic-leadtime { font-size:9px; color:var(--text-low); }
.pic-leadtime.long { color:var(--amber); }
.risk-flags { display:flex; gap:3px; flex-wrap:wrap; margin-top:5px; }
.pic-card-add { background:transparent; border:2px dashed rgba(174,239,227,0.25); border-radius:var(--radius); display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:260px; cursor:pointer; transition:all 0.25s; }
.pic-card-add:hover { border-color:var(--secondary); background:rgba(174,239,227,0.04); }
.pic-card-add .plus { font-size:32px; color:var(--secondary); margin-bottom:6px; font-weight:300; }
.pic-card-add .add-label { font-size:11px; color:var(--text-low); }
.modal-overlay { position:fixed; inset:0; background:rgba(4,12,10,0.85); backdrop-filter:blur(8px); z-index:1000; display:flex; align-items:center; justify-content:center; padding:16px; opacity:0; pointer-events:none; transition:opacity 0.25s; }
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal-content { background:var(--card-bg); border:1px solid var(--secondary); border-radius:var(--radius); max-width:780px; width:100%; max-height:88vh; overflow-y:auto; padding:22px; box-shadow:0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(174,239,227,0.08); transform:translateY(10px); transition:transform 0.25s; }
.modal-overlay.open .modal-content { transform:translateY(0); }
.modal-content::-webkit-scrollbar { width:4px; }
.modal-content::-webkit-scrollbar-thumb { background:var(--glass-border); border-radius:2px; }
.modal-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
.modal-title { font-family:var(--font-heading); font-size:16px; font-weight:700; }
.modal-close { background:none; border:none; color:var(--text-low); cursor:pointer; font-size:18px; padding:2px 6px; border-radius:4px; }
.modal-close:hover { color:var(--text-primary); }
.modal-field { margin-bottom:10px; }
.modal-field-label { font-size:9px; color:var(--text-low); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:2px; }
.modal-field-value { font-size:12px; color:var(--text-primary); }
.modal-actions { display:flex; gap:6px; margin-top:14px; padding-top:12px; border-top:1px solid var(--glass-border); flex-wrap:wrap; }
.form-group { margin-bottom:12px; }
.form-label { display:block; font-size:9px; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-low); margin-bottom:4px; font-weight:500; }
.form-input,.form-select,.form-textarea { width:100%; background:var(--input-bg); border:1px solid var(--input-border); border-radius:8px; padding:9px 12px; color:var(--text-primary); font-size:12px; font-family:var(--font-body); outline:none; transition:border-color 0.2s, box-shadow 0.2s; }
.form-input:focus,.form-select:focus,.form-textarea:focus { border-color:var(--input-focus); box-shadow:0 0 0 3px rgba(174,239,227,0.1); }
.form-input::placeholder,.form-textarea::placeholder { color:var(--text-low); }
.form-select { cursor:pointer; }
.form-select option { background:var(--card-bg); color:var(--text-primary); }
.form-textarea { min-height:60px; resize:vertical; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
.form-check { display:flex; align-items:center; gap:7px; }
.form-check input[type="checkbox"] { width:14px; height:14px; accent-color:var(--secondary); }
.form-check label { font-size:11px; color:var(--text-muted); }
.section-row { display:flex; align-items:center; gap:10px; padding:9px 12px; border:1px solid var(--glass-border); border-radius:var(--radius-sm); margin-bottom:5px; background:var(--panel-bg); cursor:pointer; transition:all 0.2s; }
.section-row:hover { border-color:rgba(174,239,227,0.4); }
.section-code { font-family:var(--font-heading); font-size:15px; font-weight:700; color:var(--primary-light); min-width:28px; }
.section-info { flex:1; }
.section-title { font-weight:500; font-size:11px; }
.section-discipline { font-size:9px; color:var(--text-low); }
.section-count { font-size:9px; color:var(--text-muted); background:var(--card-bg); padding:2px 6px; border-radius:3px; }
.section-items { display:none; padding:4px 0 4px 40px; }
.section-row.expanded + .section-items { display:block; }
.section-item-row { display:flex; align-items:center; gap:7px; padding:4px 8px; font-size:10px; border-left:2px solid var(--glass-border); margin-bottom:2px; cursor:pointer; }
.section-item-row:hover { background:rgba(174,239,227,0.04); }
.kanban-board { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px,1fr)); gap:10px; }
.kanban-column { background:var(--panel-bg); border:1px solid var(--glass-border); border-radius:var(--radius); padding:10px; min-height:120px; }
.kanban-col-title { font-family:var(--font-heading); font-size:9px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px; padding-bottom:5px; border-bottom:1px solid var(--glass-border); }
.kanban-card { background:var(--card-bg); border:1px solid var(--glass-border); border-radius:var(--radius-sm); padding:7px 9px; margin-bottom:5px; font-size:10px; transition:all 0.2s; }
.kanban-card:hover { border-color:rgba(174,239,227,0.4); }
.kanban-card-title { font-weight:500; margin-bottom:2px; }
.kanban-card-meta { font-size:9px; color:var(--text-low); }
.integration-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:12px; }
.integration-card { background:var(--panel-bg); border:1px solid var(--glass-border); border-radius:var(--radius); padding:14px; position:relative; overflow:hidden; transition:all 0.3s; }
.integration-card:hover { border-color:rgba(174,239,227,0.4); }
.integration-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--btn-gradient); opacity:0.6; }
.integration-card-title { font-family:var(--font-heading); font-size:11px; font-weight:600; color:var(--secondary); margin-bottom:6px; display:flex; align-items:center; gap:5px; }
.integration-card-title .sd { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 5px rgba(74,222,128,0.5); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }
.integration-card-title .sd.warn { background:var(--amber); box-shadow:0 0 5px rgba(245,166,35,0.5); }
.integration-metric { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid rgba(174,239,227,0.08); font-size:10px; }
.integration-metric:last-child { border-bottom:none; }
.integration-metric .label { color:var(--text-muted); }
.integration-metric .value { color:var(--text-primary); font-weight:500; }
.connection-line { position:relative; padding-left:16px; margin:4px 0; font-size:10px; color:var(--text-muted); }
.connection-line::before { content:''; position:absolute; left:4px; top:0; bottom:0; width:2px; background:var(--glass-border); }
.connection-line::after { content:''; position:absolute; left:1px; top:50%; transform:translateY(-50%); width:7px; height:7px; border-radius:50%; background:var(--primary-light); border:2px solid var(--secondary); }
.ai-rec-card { background:linear-gradient(135deg, rgba(0,91,78,0.3), rgba(174,239,227,0.08)); border:1px solid rgba(174,239,227,0.3); border-radius:var(--radius-sm); padding:8px 10px; margin-top:5px; }
.ai-rec-card .ai-label { font-size:8px; text-transform:uppercase; letter-spacing:1px; color:var(--secondary); margin-bottom:2px; font-weight:600; }
.toast { position:fixed; bottom:18px; right:18px; background:var(--card-bg); border:1px solid var(--secondary); border-radius:var(--radius-sm); padding:9px 16px; color:var(--secondary); font-size:11px; font-weight:500; z-index:2000; box-shadow:0 8px 32px rgba(0,0,0,0.4); opacity:0; transform:translateY(10px); transition:all 0.3s; pointer-events:none; }
.toast.show { opacity:1; transform:translateY(0); }
.view-panel { display:none; }
.view-panel.active { display:block; animation:fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
/* V2 SMART SEARCH */
.smart-search-container { position:relative; margin-bottom:16px; }
.smart-search-bar { display:flex; align-items:center; gap:8px; background:var(--input-bg); border:1px solid var(--input-border); border-radius:10px; padding:10px 14px; transition:all 0.3s; }
.smart-search-bar:focus-within { border-color:var(--secondary); box-shadow:0 0 0 3px rgba(174,239,227,0.12), 0 4px 20px rgba(0,118,102,0.2); }
.smart-search-bar input { flex:1; background:none; border:none; color:var(--text-primary); font-size:13px; font-family:var(--font-body); outline:none; }
.smart-search-bar input::placeholder { color:var(--text-low); }
.smart-search-bar .search-icon { color:var(--secondary); font-size:16px; }
.smart-search-actions { display:flex; gap:4px; }

  if(role==='client') return items.filter(i=>i.clientDecision||i.approverRole==='client'||i.status==='approved');
  if(role==='contractor') return items.filter(i=>i.reviewerRole==='contractor'||i.status==='approved');
  if(role==='supplier') return items.filter(i=>i.status==='approved'||i.reviewerRole==='supplier');
  if(role==='subcontractor') return items.filter(i=>i.reviewerRole==='subcontractor'||i.status==='approved');
  return items;
}
function getFilteredItems(){
  let items=[...SAMPLE_WORKSPACE.items];
  if(currentRoom) items=items.filter(i=>i.room===currentRoom);
  if(currentPackage) items=items.filter(i=>i.package===currentPackage);
  return items;
}
function budgetSummary(){
  const items=SAMPLE_WORKSPACE.items;
  const totalAllowance=items.reduce((s,i)=>s+i.budgetAllowance,0);
  const totalEstimate=items.reduce((s,i)=>s+i.estimatedCost,0);
  const delta=totalEstimate-totalAllowance;
  const deltaPct=((delta/totalAllowance)*100).toFixed(1);
  return{totalAllowance,totalEstimate,delta,deltaPct,longLeadCount:items.filter(i=>i.leadTimeDays>42).length,staleCount:items.filter(i=>i.supersededBy).length};
}
function validateIssueReadiness(){
  const findings=[]; const items=SAMPLE_WORKSPACE.items;
  const pendingClient=items.filter(i=>i.clientDecision&&i.status!=='approved');
  if(pendingClient.length>0) findings.push({severity:'blocker',message:pendingClient.length+' client decision(s) pending',items:pendingClient.map(i=>i.code)});
  const overBudget=items.filter(i=>i.estimatedCost>i.budgetAllowance);
  if(overBudget.length>0) findings.push({severity:'high',message:overBudget.length+' item(s) over budget',items:overBudget.map(i=>i.code)});
  const superseded=items.filter(i=>i.supersededBy);
  if(superseded.length>0) findings.push({severity:'high',message:superseded.length+' item(s) superseded',items:superseded.map(i=>i.code)});
  const longLead=items.filter(i=>i.leadTimeDays>60);
  if(longLead.length>0) findings.push({severity:'medium',message:longLead.length+' item(s) lead >60d',items:longLead.map(i=>i.code)});
  if(items.filter(i=>i.status==='draft').length===0) findings.push({severity:'ok',message:'All items reviewed',items:[]});
  return findings;
}
function formatCurrency(v){return'R '+v.toLocaleString('en-ZA');}
function getStatusLabel(s){return{draft:'Draft',approved:'Approved',needs_decision:'Needs Decision',rejected:'Rejected'}[s]||s;}
function genId(){return'item-gen-'+(++idCounter);}
function genSectionId(){return'sec-gen-'+(++idCounter);}
</script>

<script>
// ===== SMART SEARCH SYSTEM =====
function handleSmartSearch(query, dropdownId){
  const dd=document.getElementById(dropdownId);
  if(!query||query.length<2){dd.classList.remove('open');return;}
  // Check if URL
  const urlRegex=/^https?:\/\//i;
  if(urlRegex.test(query)){showUrlAnalysis(dd,query);return;}
  // Build search results
  let html='';
  // From Your Library
  const personalMatches=LIBRARY_PERSONAL.filter(l=>l.title.toLowerCase().includes(query.toLowerCase()));
  if(personalMatches.length){
    html+='<div class="search-section-title">🔁 From Your Library</div>';

  }
  // Platform Library
  const platformMatches=LIBRARY_PLATFORM.filter(l=>l.title.toLowerCase().includes(query.toLowerCase()));
  if(platformMatches.length){
    html+='<div class="search-section-title">🌐 From Platform Library</div>';

  }
  // AI Web Search
  const searchKey=Object.keys(AI_SEARCH_RESULTS).find(k=>query.toLowerCase().includes(k));
  const aiResults=searchKey?AI_SEARCH_RESULTS[searchKey]:AI_SEARCH_RESULTS['basin mixer'].slice(0,2);
  html+='<div class="search-section-title">🤖 AI Web Search</div>';
  aiResults.forEach((r,idx)=>{html+='<div class="search-result-card" onclick="useAiResult('+idx+',\''+searchKey+'\')"><div class="search-result-info"><div class="name">'+r.name+'</div><div class="meta">'+r.supplier+' · ~'+formatCurrency(r.cost)+' · '+r.finish+' · '+r.leadDays+'d lead</div></div><button class="use-btn">Use this →</button></div>';});

  html+='<div class="search-section-title">✏️ Manual Entry</div>';
  html+='<div class="search-result-card" onclick="openAddItemForm()"><div class="search-result-info"><div class="name">Create from scratch</div><div class="meta">Full manual form — all fields editable</div></div><button class="use-btn">Open →</button></div>';
  dd.innerHTML=html;

}

  dd.classList.add('open');

    dd.innerHTML='<div class="search-section-title">🤖 AI Found Product</div><div class="search-result-card" onclick="useUrlResult()"><div class="search-result-info"><div class="name">Grohe Eurostyle Basin Mixer — Chrome</div><div class="meta">grohe.co.za · R3,800 · Chrome · H172mm · 14 day lead</div></div><button class="use-btn" style="opacity:1">Use this →</button></div><div class="search-result-card" onclick="openAddItemForm()"><div class="search-result-info"><div class="name" style="color:var(--text-muted)">Create from scratch instead</div><div class="meta">Ignore AI suggestion</div></div><button class="use-btn">Manual →</button></div>';

<script>
// ===== ISSUE & DISTRIBUTION =====
function toggleIssueCheck(el){
  el.classList.toggle('checked');
  checkIssueReadiness();
}
function checkIssueReadiness(){
  const checks=document.querySelectorAll('#issueChecklist .issue-checklist-item');
  const allChecked=[...checks].every(c=>c.classList.contains('checked'));
  const btn=document.getElementById('issueNowBtn');
  if(btn){
    if(allChecked){btn.disabled=false;btn.classList.add('ready-glow');}
    else{btn.disabled=true;btn.classList.remove('ready-glow');}
  }
}
function issueNow(){
  openModal(`
    <div class="modal-header"><div class="modal-title">Issue Specification P01?</div><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <p style="font-size:11px;color:var(--text-muted);margin-bottom:14px">This will distribute the specification to 5 recipients and trigger the following actions:</p>
    <div id="issueProgressList" class="issue-actions-list">
      <div class="issue-action-item" id="ia1"><div class="action-check"></div><span>Action Centre cards created for 5 recipients</span></div>
      <div class="issue-action-item" id="ia2"><div class="action-check"></div><span>Messaging threads opened per package (3 threads)</span></div>
      <div class="issue-action-item" id="ia3"><div class="action-check"></div><span>Programme milestones created (4 procurement milestones)</span></div>
      <div class="issue-action-item" id="ia4"><div class="action-check"></div><span>BoM/BoQ updated (4 line items)</span></div>
      <div class="issue-action-item" id="ia5"><div class="action-check"></div><span>Escrow funding requirements generated (R420,000 + 1% fee)</span></div>
      <div class="issue-action-item" id="ia6"><div class="action-check"></div><span>Project Passport updated</span></div>
      <div class="issue-action-item" id="ia7"><div class="action-check"></div><span>Audit trail entries written</span></div>
    </div>
    <div class="modal-actions"><button class="btn btn-gold" onclick="executeIssue()">Confirm Issue</button><button class="btn btn-secondary" onclick="closeModal()">Cancel</button></div>
  `);
}
function executeIssue(){
  const items=['ia1','ia2','ia3','ia4','ia5','ia6','ia7'];
  let i=0;
  const interval=setInterval(()=>{
    if(i>=items.length){
      clearInterval(interval);
      setTimeout(()=>{
        const hash='sha256:'+Array.from({length:64},()=>'0123456789abcdef'[Math.floor(Math.random()*16)]).join('');
        document.getElementById('issueProgressList').innerHTML='<div style="text-align:center;padding:20px"><div style="font-size:32px;margin-bottom:8px">✓</div><div style="font-family:var(--font-heading);font-size:16px;font-weight:700;color:var(--green);margin-bottom:4px">Specification P01 Issued Successfully</div><div style="font-size:9px;color:var(--text-low);font-family:monospace;word-break:break-all">Audit: '+hash+'</div><div style="font-size:10px;color:var(--text-muted);margin-top:8px">Distributed to 5 recipients · 7 actions triggered</div></div>';
        SAMPLE_WORKSPACE.issueStatus='issued';
        renderAll();
      },400);
      return;
    }
    const el=document.getElementById(items[i]);
    if(el){el.classList.add('done');el.querySelector('.action-check').textContent='✓';}
    i++;
  },300);
}
// ===== PROCUREMENT PIPELINE =====
function movePipelineItem(code, from, to){
  const fromArr=pipelineState[from];
  const idx=fromArr.indexOf(code);
  if(idx>-1){fromArr.splice(idx,1);pipelineState[to].push(code);}
  renderProcurement();
  showToast('✓ '+code+' moved to '+to);
  if(to==='Installed') showToast('💰 Payment unlock triggered for '+code);
}
function createIssueSnapshot(){
  const budget=budgetSummary();const readiness=validateIssueReadiness();
  const snapshot={snapshotId:'SNAP-'+Date.now().toString(36).toUpperCase(),workspaceId:SAMPLE_WORKSPACE.id,projectName:SAMPLE_WORKSPACE.projectName,revision:SAMPLE_WORKSPACE.revision,timestamp:new Date().toISOString(),issuer:SAMPLE_WORKSPACE.team.find(t=>t.role===currentRole)?.name||currentRole,issuerRole:currentRole,auditHash:'sha256:'+Array.from({length:64},()=>'0123456789abcdef'[Math.floor(Math.random()*16)]).join(''),budgetSummary:budget,readinessFindings:readiness,itemCount:SAMPLE_WORKSPACE.items.length,sectionCount:SAMPLE_WORKSPACE.sections.length};
  openModal('<div class="modal-header"><div class="modal-title">Issue Snapshot Created</div><button class="modal-close" onclick="closeModal()">&times;</button></div><div class="modal-field"><div class="modal-field-label">Snapshot ID</div><div class="modal-field-value" style="color:var(--secondary);font-family:monospace">'+snapshot.snapshotId+'</div></div><div class="modal-field"><div class="modal-field-label">Timestamp</div><div class="modal-field-value">'+snapshot.timestamp+'</div></div><div class="modal-field"><div class="modal-field-label">Audit Hash</div><div class="modal-field-value" style="font-family:monospace;font-size:9px;word-break:break-all">'+snapshot.auditHash+'</div></div><div class="modal-field"><div class="modal-field-label">JSON</div><div class="snapshot-json">'+JSON.stringify(snapshot,null,2)+'</div></div>');
}
</script>

function renderPictorial(){

    if(item.supersededBy) flags.push({l:'Superseded',c:'badge-red'});

dal-field" style="margin-top:8px"><div class="modal-field-label">Drawing Refs</div><div class="modal-field-value">'+item.drawingRefs.join(', ')+'</div></div><div class="modal-field"><div class="modal-field-label">Notes</div><div class="modal-field-value">'+(item.notes||'—')+'</div></div><div style="margin-top:8px"><div class="modal-field-label">Comments ('+item.comments.length+')</div><div style="margin-top:4px">'+comments+'</div></div><div class="modal-actions">'+act+'</div>');

    html+='<div class="drawing-list-item"><div class="dl-icon">📄</div><div class="dl-info"><div class="dl-name">'+d.name+'</div><div class="dl-meta">'+d.pages+' pages'+(sugCount?' · '+sugCount+' items identified':'')+'</div></div>';
    if(d.status==='scanned') html+='<span class="dl-status" style="background:rgba(74,222,128,0.12);color:var(--green)">✓ Scanned</span>';
    else html+='<span class="dl-status" style="background:rgba(245,166,35,0.12);color:var(--amber)">Pending</span>';
    if(hasSuggestions) html+='<button class="btn btn-secondary" onclick="showDrawingSuggestions(\''+d.id+'\')">View</button>';
    else if(d.status!=='scanned') html+='<button class="btn btn-primary" onclick="simulateAiScanInline(\''+d.id+'\')">AI Scan</button>';
    html+='</div>';
  });
  document.getElementById('drawingsList').innerHTML=html;
  // All suggestions combined
  let sugHtml='';
  let totalSuggestions=0;
  Object.entries(DRAWING_AI_SUGGESTIONS).forEach(([drawingId,suggestions])=>{
    const drw=PROJECT_DRAWINGS.find(d=>d.id===drawingId);
    suggestions.forEach(s=>{
      totalSuggestions++;
      const confClass=s.confidence>=85?'high':'med';
      sugHtml+='<div class="ai-suggestion-card"><span class="conf '+confClass+'">'+s.confidence+'%</span><div style="flex:1"><div style="font-size:11px;font-weight:500">'+s.item+'</div><div style="font-size:9px;color:var(--text-low)">'+s.qty+' · From: '+(drw?drw.name:'Drawing')+'</div></div><button class="btn btn-primary" style="font-size:9px" onclick="addFromDrawingSuggestion(\''+s.item+'\',\''+s.qty+'\')">Add →</button></div>';
    });
  });
  if(totalSuggestions>0){
    sugHtml='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:10px;color:var(--text-muted)">'+totalSuggestions+' items identified across all drawings</span><button class="btn btn-primary" onclick="addAllDrawingsSuggestions()">Add all ('+totalSuggestions+')</button></div>'+sugHtml;
  } else {
    sugHtml='<p style="font-size:10px;color:var(--text-low)">No AI suggestions yet. Scan drawings to identify items.</p>';
  }
  document.getElementById('allDrawingSuggestions').innerHTML=sugHtml;
}
function simulateAiScanInline(drawingId){
  showToast('🤖 Scanning drawing...');
  setTimeout(()=>{
    DRAWING_AI_SUGGESTIONS[drawingId]=[{item:'Ceiling grid — Office',qty:'180m²',confidence:82},{item:'Switch plate — Standard',qty:'24 No.',confidence:71}];
    const drw=PROJECT_DRAWINGS.find(d=>d.id===drawingId);
    if(drw) drw.status='scanned';
    renderDrawings();
    showToast('✓ AI scan complete');
  },1800);
}
function addAllDrawingsSuggestions(){
  let count=0;
  Object.values(DRAWING_AI_SUGGESTIONS).forEach(suggestions=>{
    suggestions.forEach(s=>{
      const item={id:genId(),sectionId:'sec-finishes',code:'AI-'+String(++idCounter).padStart(3,'0'),title:s.item,room:'Per drawing',package:'General',discipline:'general',image:'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="640" height="420"><rect width="640" height="420" fill="%23162e28"/><text x="100" y="220" font-size="22" fill="%23aeefe3">'+s.item.substring(0,22)+'</text></svg>',supplier:'TBC',model:'',finish:'',dimensions:s.qty,drawingRefs:[],clauseRefs:[],budgetAllowance:0,estimatedCost:0,leadTimeDays:14,clientDecision:false,ownerRole:'architect',reviewerRole:'quantity_surveyor',approverRole:'client',status:'draft',sourceRevision:'P01',supersededBy:null,sustainability:'',warranty:'',notes:'AI scan ('+s.confidence+'% confidence)',comments:[]};
      SAMPLE_WORKSPACE.items.push(item);
      count++;
    });
  });
  showToast('✓ '+count+' items added from all drawings');
  renderAll();
}
function renderPlanning(){
  const items=SAMPLE_WORKSPACE.items;
  const pkgs=items.map(i=>({subject:'Procure: '+i.title,status:i.status==='approved'?'In Progress':'New',priority:i.leadTimeDays>60?'High':'Normal',assignee:i.ownerRole}));
  const cols={'New':[],'In Progress':[],'Done':[]};
  pkgs.forEach(p=>{(cols[p.status]||cols['New']).push(p);});
  document.getElementById('kanbanBoard').innerHTML=Object.entries(cols).map(([s,cards])=>'<div class="kanban-column"><div class="kanban-col-title">'+s+' ('+cards.length+')</div>'+cards.map(c=>'<div class="kanban-card"><div class="kanban-card-title">'+c.subject+'</div><div class="kanban-card-meta"><span class="badge" style="margin-right:3px">'+c.priority+'</span>'+c.assignee+'</div></div>').join('')+'</div>').join('');
}
function renderCloseout(){
  const items=SAMPLE_WORKSPACE.items;const ap=items.filter(i=>i.status==='approved').length;const t=items.length;const pct=((ap/t)*100).toFixed(0);const bs=budgetSummary();
  const allA=ap===t;const wb=bs.delta<=0;const ns=bs.staleCount===0;const ready=allA&&wb&&ns;
  document.getElementById('closeoutStatus').innerHTML='<div class="stats-grid" style="margin-bottom:14px"><div class="stat-card"><div class="stat-value" style="color:'+(allA?'var(--green)':'var(--amber)')+'">'+pct+'%</div><div class="stat-label">Approved</div></div><div class="stat-card"><div class="stat-value" style="color:'+(wb?'var(--green)':'var(--danger)')+'">'+(wb?'✓':'✗')+'</div><div class="stat-label">Budget</div></div><div class="stat-card"><div class="stat-value" style="color:'+(ns?'var(--green)':'var(--danger)')+'">'+(ns?'✓':'✗')+'</div><div class="stat-label">No Stale</div></div></div><div style="padding:12px;border-radius:var(--radius-sm);border:1px solid '+(ready?'var(--green)':'var(--amber)')+';background:'+(ready?'rgba(74,222,128,0.06)':'rgba(245,166,35,0.06)')+'"><div style="font-weight:600;font-size:11px;color:'+(ready?'var(--green)':'var(--amber)')+'">'+(ready?'✓ Ready for Issue':'⚠ Not Ready')+'</div><div style="font-size:10px;color:var(--text-muted);margin-top:3px">'+(ready?'All conditions met.':(t-ap)+' item(s) pending approval. '+(bs.delta>0?'Budget over by '+formatCurrency(bs.delta)+'.':''))+'</div></div>';
}
</script>
<script>
function renderIntegration(){
  const bs=budgetSummary();const items=SAMPLE_WORKSPACE.items;
  const pd=items.filter(i=>i.clientDecision&&i.status!=='approved').length;
  const tc=items.reduce((s,i)=>s+(i.comments||[]).length,0);
  document.getElementById('integrationGrid').innerHTML=`
    <div class="integration-card"><div class="integration-card-title"><span class="sd"></span>Project Passport</div><div class="integration-metric"><span class="label">Status</span><span class="value"><span class="chip chip-${SAMPLE_WORKSPACE.issueStatus}">${getStatusLabel(SAMPLE_WORKSPACE.issueStatus)}</span></span></div><div class="integration-metric"><span class="label">Open Decisions</span><span class="value" style="color:var(--gold)">${pd}</span></div><div class="integration-metric"><span class="label">Budget Delta</span><span class="value" style="color:${bs.delta>0?'var(--danger)':'var(--green)'}">${bs.delta>0?'+':''}${bs.deltaPct}%</span></div></div>
    <div class="integration-card"><div class="integration-card-title"><span class="sd"></span>AI Agent Recommendations</div><div class="ai-rec-card"><div class="ai-label">🤖 Recommendation</div><div style="font-size:10px">${pd} client decisions pending — send reminder</div></div><div class="ai-rec-card"><div class="ai-label">🤖 Early Procurement</div><div style="font-size:10px">Feature pendant: 84-day lead — issue RFQ now</div></div><div class="ai-rec-card"><div class="ai-label">🤖 Budget</div><div style="font-size:10px">Wall tile over allowance — alternative supplier found at R580/m²</div></div><div class="ai-rec-card"><div class="ai-label">🤖 Drawing Intelligence</div><div style="font-size:10px">FIN-100 scanned — 4 new items suggested for specification</div></div></div>
    <div class="integration-card"><div class="integration-card-title"><span class="sd warn"></span>Messaging Centre</div><div class="integration-metric"><span class="label">Comments</span><span class="value">${tc} across items</span></div><div class="integration-metric"><span class="label">Unread</span><span class="value" style="color:var(--gold)">2</span></div><div class="connection-line">Comments → Action Centre cards</div><div class="connection-line">Approvals → inbox notifications</div><div class="connection-line">Issue → distribution threads</div></div>
    <div class="integration-card"><div class="integration-card-title"><span class="sd"></span>Payment & Escrow</div><div class="integration-metric"><span class="label">Total Estimate</span><span class="value">${formatCurrency(bs.totalEstimate)}</span></div><div class="integration-metric"><span class="label">Platform Fee (1%)</span><span class="value">${formatCurrency(Math.round(bs.totalEstimate*0.01))}</span></div><div class="integration-metric"><span class="label">Escrow Required</span><span class="value" style="color:var(--secondary)">${formatCurrency(bs.totalEstimate)}</span></div><div class="integration-metric"><span class="label">Unlock Condition</span><span class="value">Issued + Delivered + Evidence</span></div></div>
    <div class="integration-card"><div class="integration-card-title"><span class="sd"></span>Procurement Pipeline</div><div class="connection-line">Issued specs → RFQ packages</div><div class="connection-line">Quotes → Purchase orders</div><div class="connection-line">PO → Delivery tracking</div><div class="integration-metric"><span class="label">Ready for RFQ</span><span class="value">${items.filter(i=>i.status==='approved').length} items</span></div><div class="integration-metric"><span class="label">Pipeline Active</span><span class="value">${Object.values(pipelineState).flat().length} items</span></div></div>
    <div class="integration-card"><div class="integration-card-title"><span class="sd"></span>Programme / Gantt</div><div class="integration-metric"><span class="label">Sync</span><span class="value" style="color:var(--green)">✓ Connected</span></div><div class="integration-metric"><span class="label">Work Packages</span><span class="value">${items.length*2} generated</span></div><div class="integration-metric"><span class="label">Critical Path</span><span class="value" style="color:var(--amber)">LGT-PD-001 (84d)</span></div><div class="connection-line">Long-lead → planning constraints</div></div>
    <div class="integration-card"><div class="integration-card-title"><span class="sd"></span>BoM / BoQ</div><div class="integration-metric"><span class="label">Line Items</span><span class="value">${items.length}</span></div><div class="integration-metric"><span class="label">Total Value</span><span class="value">${formatCurrency(bs.totalEstimate)}</span></div><div class="connection-line">Spec items = BoM line items</div><div class="connection-line">Quantities from drawings</div><div class="connection-line">Rates from supplier quotes</div></div>
    <div class="integration-card"><div class="integration-card-title"><span class="sd warn"></span>Drawing Intelligence</div><div class="integration-metric"><span class="label">Drawings Scanned</span><span class="value">${PROJECT_DRAWINGS.filter(d=>d.status==='scanned').length}/${PROJECT_DRAWINGS.length}</span></div><div class="integration-metric"><span class="label">Items Identified</span><span class="value">${Object.values(DRAWING_AI_SUGGESTIONS).flat().length}</span></div><div class="connection-line">Drawing revision → spec review flag</div><div class="connection-line">AI scan → suggested items</div></div>
    <div class="integration-card"><div class="integration-card-title"><span class="sd"></span>Audit Trail</div><div style="padding:8px;background:var(--bg-deep);border-radius:var(--radius-sm);border:1px solid var(--glass-border);font-family:monospace;font-size:8px;color:var(--secondary);max-height:120px;overflow-y:auto"><div>[${new Date(Date.now()-3600000).toISOString().slice(0,19)}] ITEM_APPROVED · FFE-CH-001</div><div>[${new Date(Date.now()-7200000).toISOString().slice(0,19)}] COMMENT · FIN-WT-001 · QS Reviewer</div><div>[${new Date(Date.now()-10800000).toISOString().slice(0,19)}] AI_SCAN · FIN-100 · 4 items found</div><div>[${new Date(Date.now()-14400000).toISOString().slice(0,19)}] ITEM_CREATED · LGT-PD-001</div><div>[${new Date(Date.now()-18000000).toISOString().slice(0,19)}] SECTION_CREATED · Custom Joinery</div><div>[${new Date(Date.now()-21600000).toISOString().slice(0,19)}] LIBRARY_MATCH · FIN-WT-001 · 94% similar</div></div></div>
  `;
}
</script>
<script>
// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  buildShell();
  renderAll();
  // Close search dropdowns on click outside
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.smart-search-container')) {
      closeSearchDropdowns();
    }
  });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    closeSearchDropdowns();
  }
});
</script>
